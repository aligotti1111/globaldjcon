<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* CSS vars copied from main site so the calendar renders identically */
  :root {
    --black: #050507;
    --deep: #0a0a10;
    --card: #13131e;
    --border: #1e1e30;
    --neon: #00f5c4;
    --neon-dim: rgba(0,245,196,0.12);
    --neon-dark: #0a6f61;
    --pink: #f5e642;
    --pink-dim: rgba(245,230,66,0.12);
    --white: #f0f0f8;
    --muted: #6b6b88;
    --success: #3ddc84;
    --amber: #ffb347;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  /* Transparent background so the embed inherits the host page's color */
  html, body {
    background: transparent;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }
  body {
    padding: 12px;
    /* Mobile: tighter padding */
  }
  @media (max-width: 480px) {
    body { padding: 8px; }
  }
  /* Calendar container — inherits theme by default; query param can override */
  #embed-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    max-width: 100%;
  }
  body[data-theme="light"] {
    color: #1a1a2e;
  }
  body[data-theme="light"] #embed-wrap {
    background: #ffffff;
    border-color: #e5e7eb;
  }
  body[data-theme="light"] {
    --white: #1a1a2e;
    --deep: #f8fafc;
    --card: #ffffff;
    --border: #d1d5db;
    --muted: #6b7280;
    /* Use a darker, more legible accent in light mode — the bright neon cyan
       has no contrast against white. This still feels brand-related but reads. */
    --neon: #0a8e76;
    --neon-dim: rgba(10, 142, 118, 0.12);
    --neon-dark: #065f4f;
    --black: #ffffff;
  }
  /* Light-mode-specific overrides for elements the calendar renders inline */
  body[data-theme="light"] .cal-badge {
    background: #0a8e76 !important;
    color: #ffffff !important;
    border-color: #0a8e76 !important;
  }
  body[data-theme="light"] .cal-badge:hover {
    background: #065f4f !important;
  }
  /* Calendar grid borders + day numbers need darker tones in light mode */
  body[data-theme="light"] #pub-cal-grid-wrap > div,
  body[data-theme="light"] #pub-cal-rolling-wrap > div {
    border-color: #d1d5db !important;
  }
  /* Footer — small attribution + click-through */
  .embed-footer {
    text-align: center;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .embed-footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dotted currentColor;
  }
  .embed-footer a:hover { color: var(--neon); border-bottom-color: var(--neon); }
  /* Loading state */
  .embed-loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .embed-error {
    text-align: center;
    padding: 30px 20px;
    color: var(--amber);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  /* Hide the view-toggle button (1 MONTH / 12 MONTHS) — embeds are always
     month-by-month. The button is part of djp-cal-public.js which we share
     with the main site, so we hide rather than remove. */
  #pub-cal-view-toggle { display: none !important; }
</style>
</head>
<body>

<div id="embed-wrap">
  <div id="p-booking-calendar">
    <div class="embed-loading">Loading calendar…</div>
  </div>
  <div class="embed-footer">
    Powered by <a href="https://globaldjconnect.com" target="_blank" rel="noopener">Global DJ Connect</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/djp-cal-public.js"></script>
<script>
// ── Embed bootstrap ──────────────────────────────────────────────
const SUPABASE_URL = 'https://hwqvzuusquruhwguqole.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cXZ6dXVzcXVydWh3Z3Vxb2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjkxNjUsImV4cCI6MjA4NzE0NTE2NX0.TKoNk-u5bEKgVy-pXRrCYv8Iui8SzIa5ExiVUyEJ6UE';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Read URL params: ?slug=joey&theme=dark|light&months=1|3
const params = new URLSearchParams(window.location.search);
const slug = (params.get('slug') || '').trim().toLowerCase();
const theme = params.get('theme') === 'light' ? 'light' : 'dark';
const monthsParam = parseInt(params.get('months') || '1', 10);
// Embeds only support 1 or 3 months — keeps the iframe a sensible height for
// host sites. The full 12-month view stays available on globaldjconnect.com.
const months = monthsParam === 3 ? 3 : 1;

document.body.setAttribute('data-theme', theme);

// Parent-page resize handshake — sends current document height upward so the
// host iframe can auto-resize and avoid scrollbars on mobile/desktop.
function postHeight() {
  try {
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'gdc-embed-height', height: h, slug }, '*');
  } catch (e) { /* parent unreachable, ignore */ }
}
// Resend after any DOM mutation (calendar re-renders) and on resize
const resizeObs = new ResizeObserver(() => postHeight());
resizeObs.observe(document.body);
window.addEventListener('resize', postHeight);

// Override the day-click handlers used by djp-cal-public.js. The calendar
// renders different click behaviour depending on whether sessionStorage has
// a user — but in an iframe sessionStorage is empty, so showBookingGate fires
// for unbooked dates while ib_openForInline fires when there IS a logged-in
// session (rare in embed). Both should open the booking flow on globaldjconnect.
function openBookingFor(djSlug, dateKey) {
  const url = dateKey
    ? `https://globaldjconnect.com/${encodeURIComponent(djSlug)}?date=${encodeURIComponent(dateKey)}`
    : `https://globaldjconnect.com/${encodeURIComponent(djSlug)}`;
  window.open(url, '_blank', 'noopener');
}
window.ib_openForInline = openBookingFor;
window.showBookingGate = function () { openBookingFor(slug); };
// Booked-event popup handler also referenced — provide a no-op so clicks on
// booked days don't error
window.showBookedEventPopup = function () { /* no-op in embed */ };

// Main fetch + render
(async function init() {
  if (!slug) {
    document.getElementById('p-booking-calendar').innerHTML =
      '<div class="embed-error">No DJ specified.</div>';
    postHeight();
    return;
  }
  try {
    const { data, error } = await db
      .from('users')
      .select('slug,name,booking_settings,dj_type')
      .eq('slug', slug)
      .eq('role', 'dj')
      .single();
    if (error || !data) throw new Error('DJ not found.');

    let bs = {};
    try { bs = typeof data.booking_settings === 'string'
      ? JSON.parse(data.booking_settings || '{}')
      : (data.booking_settings || {}); } catch (e) {}

    // Pick the right field based on DJ type. Mobile DJs store availability in
    // `mob_booking_days`, club DJs in `booking_days`. The schema split exists
    // because the two flows have very different per-day data shapes.
    const bookingDays = (data.dj_type === 'mobile')
      ? (bs.mob_booking_days || {})
      : (bs.booking_days || bs.mob_booking_days || {});

    // Pick the right window-cap field too — mobile DJs use mob_booking_window,
    // club DJs use booking_window_months. Default to 12 if neither set.
    const windowMonths = (data.dj_type === 'mobile')
      ? (bs.mob_booking_window || 12)
      : (bs.booking_window_months || bs.mob_booking_window || 12);

    // Render via the existing public-calendar function. We pass the DJ's actual
    // booking window cap (e.g. 36 months) NOT the embed `months` display setting.
    // The renderer uses the cap to limit navigation arrows + year dropdown.
    renderPublicCalendar(
      bookingDays,
      data.slug,
      false,                      // isOwner — always false on embed
      bs.allow_offers,
      bs.equip_full,
      bs.equip_decks,
      bs.equip_none,
      bs.global_rate_type,
      bs.rate_with_system,
      bs.rate_with_decks,
      bs.rate_no_equip,
      bs.base_rate,
      windowMonths
    );
    postHeight();
  } catch (e) {
    document.getElementById('p-booking-calendar').innerHTML =
      `<div class="embed-error">Calendar unavailable.</div>`;
    postHeight();
  }
})();
</script>
</body>
</html>
