<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050507;
  --deep: #0a0a10;
  --card: #13131e;
  --border: #1e1e30;
  --neon: #00f5c4;
  --neon-dim: rgba(0,245,196,0.12);
  --white: #f0f0f8;
  --muted: #6b6b88;
  --error: #ff5f5f;
  --success: #3ddc84;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: .4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}
.container {
  position: relative;
  z-index: 2;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 50px 40px;
  border-radius: 12px;
  max-width: 520px;
  width: 100%;
}
.logo { text-align: center; margin-bottom: 36px; }
.logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  background: linear-gradient(135deg, var(--white) 30%, var(--neon) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.logo .tagline {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: .08em;
  color: var(--white);
  margin-bottom: .3rem;
}
.page-sub {
  font-family: 'Space Mono', monospace;
  font-size: .62rem;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 2rem;
}
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: .75rem 1rem;
  background: var(--deep);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--neon);
  box-shadow: 0 0 0 3px rgba(0,245,196,.07);
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--muted); }
.form-group select option { background: var(--card); color: var(--white); }
.form-group textarea { resize: vertical; min-height: 130px; line-height: 1.6; }
.submit-btn {
  width: 100%;
  padding: .9rem;
  background: var(--neon);
  border: none;
  border-radius: 8px;
  color: var(--black);
  font-family: 'Space Mono', monospace;
  font-size: .72rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s;
  margin-top: 4px;
}
.submit-btn:hover { opacity: .85; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.alert { margin-bottom: 1.2rem; font-family: 'Space Mono', monospace; font-size: .68rem; letter-spacing: .05em; padding: .75rem 1rem; border-radius: 8px; }
.alert-error { background: rgba(255,95,95,.1); border: 1px solid rgba(255,95,95,.3); color: var(--error); }
.alert-success { background: rgba(61,220,132,.1); border: 1px solid rgba(61,220,132,.3); color: var(--success); }
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Space Mono', monospace;
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  margin-top: 1.5rem;
  transition: color .2s;
}
.back-link:hover { color: var(--neon); }
.divider { text-align: center; margin-top: 1.5rem; font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: .05em; }
.divider a { color: var(--neon); text-decoration: none; }
.divider a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <a href="/" style="text-decoration:none;">
      <h1>GLOBAL DJ CONNECT</h1>
    </a>
    <p class="tagline">Directory & Booking</p>
  </div>

  <div class="page-title">Contact Us</div>
  <p class="page-sub">We'll get back to you as soon as possible</p>

  <div id="alert"></div>

  <div id="form-view">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="contact-name" placeholder="Jane Smith">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="contact-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Subject</label>
      <select id="contact-subject">
        <option value="">Select a subject...</option>
        <option value="General Inquiry">General Inquiry</option>
        <option value="DJ Profile Issue">DJ Profile Issue</option>
        <option value="Booking Help">Booking Help</option>
        <option value="Account Issue">Account Issue</option>
        <option value="Report a Problem">Report a Problem</option>
        <option value="Partnership / Advertising">Partnership / Advertising</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="contact-message" placeholder="Tell us how we can help..."></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitContact()">Send Message</button>
  </div>

  <div id="success-view" style="display:none; text-align:center; padding: 2rem 0;">
    <div style="font-size:2.5rem; margin-bottom:1rem;">✅</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;color:var(--white);margin-bottom:.5rem;">Message Sent!</div>
    <p style="font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;line-height:1.9;">We received your message and will<br>get back to you shortly.</p>
  </div>

  <div class="divider">
    <a href="/">← Back to Directory</a>
  </div>
</div>

<script>
async function submitContact() {
  const btn = document.getElementById('submit-btn');
  const alertEl = document.getElementById('alert');
  alertEl.innerHTML = '';

  const name = document.getElementById('contact-name').value.trim();
  const email = document.getElementById('contact-email').value.trim().toLowerCase();
  const subject = document.getElementById('contact-subject').value;
  const message = document.getElementById('contact-message').value.trim();

  if (!name || !email || !subject || !message) {
    alertEl.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter a valid email address.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/.netlify/functions/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'contact_us', name, email, subject, message })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send');

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">Error: ${err.message}. Email us at <a href="mailto:info@globaldjconnect.com" style="color:var(--neon);">info@globaldjconnect.com</a></div>`;
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
}
</script>
</body>
</html>
