[functions]
  directory = "netlify/functions"

[build]
  functions = "netlify/functions"

# Cache headers: force browsers to revalidate JS/CSS/HTML on every request.
# Without this, users may see stale code for hours/days after a deploy.
# 'no-cache' tells browsers to always check the server before using cached content.
# Server returns 304 Not Modified if unchanged (fast), or fresh content if changed.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
