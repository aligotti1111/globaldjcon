<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<style>
:root {
  --black: #050507;
  --deep: #0a0a10;
  --card: #13131e;
  --border: #1e1e30;
  --neon: #00f5c4;
  --neon-dim: rgba(0,245,196,0.12);
  --white: #f0f0f8;
  --muted: #6b6b88;
  --error: #ff5f5f;
  --success: #3ddc84;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: .4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}
.container {
  position: relative;
  z-index: 2;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 50px 40px;
  border-radius: 12px;
  max-width: 450px;
  width: 100%;
}
.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo h1 { 
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  background: linear-gradient(135deg, var(--white) 30%, var(--neon) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.logo .tagline {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--neon);
  text-decoration: none;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 30px;
  transition: opacity 0.2s;
}
.back-link:hover {
  opacity: 0.7;
}
.form-group { margin-bottom: 20px; }
label { 
  display: block; 
  margin-bottom: 8px; 
  font-size: 13px;
  color: var(--white);
  font-weight: 500;
}
input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 15px;
  transition: all 0.2s;
  background: var(--deep);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
}
input:focus {
  outline: none;
  border-color: var(--neon);
  background: var(--card);
}
button {
  width: 100%;
  padding: 16px;
  background: var(--neon-dim);
  border: 1px solid var(--neon);
  color: var(--neon);
  border-radius: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
button:hover { 
  background: rgba(0,245,196,.22);
}
button:disabled { 
  opacity: 0.5;
  cursor: not-allowed;
}
.alert { 
  padding: 14px 16px; 
  border-radius: 6px; 
  margin-bottom: 20px;
  font-size: 13px;
  border: 1px solid;
}
.alert-success { 
  background: rgba(61,220,132,0.12);
  color: var(--success);
  border-color: rgba(61,220,132,0.35);
}
.alert-error { 
  background: rgba(255,95,95,0.12);
  color: var(--error);
  border-color: rgba(255,95,95,0.35);
}
.info-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 20px;
}
.success-view {
  display: none;
  text-align: center;
}
.success-view.active {
  display: block;
}
.success-view h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  color: var(--success);
  margin-bottom: 15px;
}
.success-view p {
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="container">
  <a href="login.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back to Login
  </a>

  <div id="form-view">
    <div class="logo">
      <h1>Forgot Password</h1>
      <p class="tagline">Reset Your Password</p>
    </div>

    <p class="info-text">Enter your email address and we'll send you a link to reset your password.</p>
    
    <div id="alert"></div>
    
    <form id="forgot-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      
      <button type="submit" id="submit-btn">Send Reset Link</button>
    </form>
  </div>

  <div id="success-view" class="success-view">
    <div class="logo">
      <h1>GLOBAL DJ CONNECT</h1>
    </div>
    <h2>✓ Check Your Email</h2>
    <p>We've sent a password reset link to <strong id="email-sent"></strong></p>
    <p style="font-size: 13px; margin-top: 20px;">Click the link in the email to reset your password.</p>
    <a href="login.html" style="display: inline-block; margin-top: 30px; padding: 14px 30px; background: var(--neon-dim); border: 1px solid var(--neon); color: var(--neon); text-decoration: none; border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.2s;">Back to Login</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hwqvzuusquruhwguqole.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cXZ6dXVzcXVydWh3Z3Vxb2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjkxNjUsImV4cCI6MjA4NzE0NTE2NX0.TKoNk-u5bEKgVy-pXRrCYv8Iui8SzIa5ExiVUyEJ6UE';
const db = window.db || window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('forgot-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');
  const email = document.getElementById('email').value.toLowerCase();

  btn.disabled = true;
  btn.textContent = 'Sending...';
  alert.innerHTML = '';

  try {
    // Supabase sends the reset email; it handles token generation, expiry, and delivery via our SMTP (Resend).
    // The link in the email will redirect users to /reset-password.html with a recovery token in the URL.
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    // Even if there's an error, we show success — we don't want to reveal whether an email is registered.
    if (error) {
      console.warn('[forgot-password]', error.message);
    }

    // Show success
    document.getElementById('email-sent').textContent = email;
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').classList.add('active');

  } catch (error) {
    alert.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
});
</script>

</body>
</html>
