<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Requests - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function openMobileMenu(){document.getElementById('mobile-menu').classList.add('open');}
function closeMobileMenu(){document.getElementById('mobile-menu').classList.remove('open');}
function gdcSetupMobileMenu(){
  var cu=null;
  try{cu=JSON.parse(sessionStorage.getItem('currentUser')||localStorage.getItem('currentUser')||'null');}catch(e){}
  if(!cu){
    var lo=document.getElementById('mobile-menu-loggedout');if(lo)lo.style.display='block';
    return;
  }
  var li=document.getElementById('mobile-menu-loggedin');if(li)li.style.display='block';
  if(cu.role==='dj'){
    var d=document.getElementById('mobile-menu-dj');if(d)d.style.display='block';
    var mv=document.getElementById('mob-view-profile');if(mv&&cu.slug)mv.href='/'+cu.slug;
  }else{
    var v=document.getElementById('mobile-menu-venue');if(v)v.style.display='block';
  }
}
document.addEventListener('DOMContentLoaded',gdcSetupMobileMenu);
</script>
<style>
:root{--black:#050507;--deep:#0a0a10;--card:#13131e;--border:#1e1e30;--neon:#00f5c4;--neon-dim:rgba(0,245,196,0.12);--pink:#f5e642;--white:#f0f0f8;--muted:#6b6b88;--success:#3ddc84;--error:#ff5f5f;--amber:#ffb347;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}
header{position:relative;z-index:10;border-bottom:1px solid var(--border);background:rgba(5,5,7,.85);backdrop-filter:blur(12px);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;background:linear-gradient(135deg,var(--white) 30%,var(--neon) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-btns{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:.45rem;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;padding:.5rem .85rem;border-radius:6px;border:1px solid;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-outline{background:transparent;border-color:var(--border);color:var(--white);}
.btn-outline:hover{border-color:var(--neon);color:var(--neon);}
.btn-primary{background:var(--neon);border-color:var(--neon);color:var(--black);font-weight:700;}
.btn-primary:hover{opacity:.85;}
.btn-sm{padding:.4rem .75rem;font-size:.6rem;}
.btn-danger{background:transparent;border-color:var(--error);color:var(--error);}
.btn-danger:hover{background:rgba(255,95,95,.1);}
.btn-amber{background:transparent;border-color:var(--amber);color:var(--amber);}
.btn-amber:hover{background:rgba(255,179,71,.1);}
.inbox-nav-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:transparent;transition:all .2s;text-decoration:none;}
.inbox-nav-btn:hover{border-color:var(--neon);color:var(--neon);}
.inbox-badge{position:absolute;top:-6px;right:-6px;background:var(--neon);color:var(--black);font-family:'Space Mono',monospace;font-size:.55rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.page{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;margin-bottom:.25rem;}
.page-sub{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;}
.tab-btn{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.7rem 1rem;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap;}
.tab-btn.active{color:var(--neon);border-bottom-color:var(--neon);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.request-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;transition:border-color .2s;}
.request-card:hover{border-color:var(--muted);}
.request-card.pending{border-left:3px solid var(--amber);}
.request-card.approved{border-left:3px solid var(--success);}
.request-card.denied{border-left:3px solid var(--error);}
.request-card.counter{border-left:3px solid var(--neon);}
.req-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.85rem;}
.req-name{font-size:.95rem;font-weight:600;color:var(--white);}
.req-date{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--muted);margin-top:2px;}
.status-badge{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.status-pending{background:rgba(255,179,71,.15);color:var(--amber);}
.status-approved{background:rgba(61,220,132,.15);color:var(--success);}
.status-denied{background:rgba(255,95,95,.15);color:var(--error);}
.status-counter{background:var(--neon-dim);color:var(--neon);}
.status-cancelled{background:rgba(107,107,136,.15);color:var(--muted);}
.request-card.cancelled{border-left:3px solid var(--muted);}
.req-details{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;margin-bottom:.85rem;}
.req-detail-item{font-size:.8rem;}
.req-detail-item .lbl{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px;}
.req-detail-item .val{color:var(--white);}
.req-notes{background:var(--deep);border-radius:6px;padding:.75rem;font-size:.82rem;color:var(--muted);margin-bottom:1rem;line-height:1.5;}
.req-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.25rem;}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.08em;}
.modal-backdrop{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.75rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--neon);margin-bottom:1rem;}
.form-row{margin-bottom:1rem;}
.form-row label{display:block;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;}
.form-row input,.form-row textarea,.form-row select{width:100%;background:var(--deep);border:1px solid var(--border);border-radius:6px;padding:.6rem .85rem;color:var(--white);font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;}
.form-row input:focus,.form-row textarea:focus{border-color:var(--neon);}
.form-row textarea{resize:vertical;min-height:100px;}
.alert{padding:.65rem 1rem;border-radius:6px;font-size:.82rem;margin-bottom:.75rem;}
.alert-success{background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);color:var(--success);}
.alert-error{background:rgba(255,95,95,.1);border:1px solid rgba(255,95,95,.3);color:#ff5f5f;}
@media(max-width:600px){.req-details{grid-template-columns:1fr 1fr;}.req-actions{flex-direction:column;}.req-actions .btn{justify-content:center;width:100%;}}

.hamburger-btn{display:none;position:absolute;left:1rem;top:50%;transform:translateY(-50%);background:transparent;border:1px solid var(--border,#1e1e30);border-radius:6px;color:var(--white,#f0f0f8);cursor:pointer;padding:.4rem .5rem;z-index:20;line-height:1;}
.mobile-menu{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);}
.mobile-menu.open{display:flex;flex-direction:column;}
.mobile-menu-panel{background:var(--card,#13131e);border-right:1px solid var(--border,#1e1e30);width:75%;max-width:280px;height:100%;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto;}
.mobile-menu-close{align-self:flex-end;background:transparent;border:none;color:var(--muted,#6b6b88);font-size:1.4rem;cursor:pointer;margin-bottom:1rem;padding:.25rem;}
.mobile-menu-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--white,#f0f0f8);text-decoration:none;border:none;background:transparent;cursor:pointer;transition:background .2s;width:100%;text-align:left;}
.mobile-menu-item:hover{background:rgba(255,255,255,.06);}
.mobile-menu-item.primary{color:var(--neon,#00f5c4);}
.mobile-menu-item.danger{color:#ff5f5f;}
.mobile-menu-divider{border:none;border-top:1px solid var(--border,#1e1e30);margin:.25rem 0;}
@media(max-width:600px){
  .hamburger-btn{display:flex !important;align-items:center;justify-content:center;position:static !important;transform:none !important;}
  .header-inner{display:grid !important;grid-template-columns:44px 1fr auto !important;align-items:center !important;padding:.75rem 1rem !important;flex-wrap:nowrap !important;justify-content:unset !important;}
  .nav-logo{text-align:center !important;font-size:1.5rem !important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-btns{position:static !important;display:flex !important;gap:.3rem;align-items:center;flex-wrap:nowrap;justify-content:flex-end;}
  .nav-btns .btn,.nav-btns .btn-outline,.nav-btns .btn-primary{display:none !important;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="hamburger-btn" onclick="openMobileMenu()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a href="/" class="nav-logo">Global DJ <span style="color:var(--neon)">Connect</span></a>
    <div class="nav-btns">
      <a href="/inbox.html" class="inbox-nav-btn" id="nav-inbox-btn" style="display:none;" title="Inbox">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span class="inbox-badge" id="nav-unread-count" style="display:none;"></span>
      </a>
      <a href="/booking-requests.html" class="inbox-nav-btn" id="nav-booking-requests-btn" style="display:none;border-color:var(--neon);color:var(--neon);" title="Booking Requests">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="inbox-badge" id="nav-booking-count" style="display:none;"></span>
      </a>
      <a href="/update-dj-profile.html" class="btn btn-primary" id="nav-edit-profile" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536M9 13l-4 4 4-4zm6.364-6.364A2 2 0 0118.2 9.4L8 19.6H4v-4L14.2 5.4a2 2 0 012.164-.532z"/></svg>
        Edit Profile
      </a>
      <a href="#" class="btn btn-outline" id="nav-view-profile" style="display:none;">
        View My Profile
      </a>
      <button id="nav-logout" class="btn btn-outline" style="display:none;" onclick="navLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu" onclick="if(event.target===this)closeMobileMenu()">
  <div class="mobile-menu-panel">
    <button class="mobile-menu-close" onclick="closeMobileMenu()">&#x2715;</button>
    <div id="mobile-menu-dj" style="display:none;">
      <a href="#" id="mob-view-profile" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>View My Profile</a>
      <a href="/update-dj-profile.html" class="mobile-menu-item primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536M9 13l-4 4 4-4zm6.364-6.364A2 2 0 0118.2 9.4L8 19.6H4v-4L14.2 5.4a2 2 0 012.164-.532z"/></svg>Edit My Profile</a>
    </div>
    <div id="mobile-menu-venue" style="display:none;">
      <a href="/account-settings.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
    </div>
    <div id="mobile-menu-loggedin" style="display:none;">
      <hr class="mobile-menu-divider">
      <button class="mobile-menu-item danger" onclick="navLogout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Log Out</button>
    </div>
    <div id="mobile-menu-loggedout" style="display:none;">
      <a href="/login.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>Sign In</a>
      <a href="/signup.html" class="mobile-menu-item primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Create Account</a>
    </div>
    <hr class="mobile-menu-divider">
    <a href="/contact.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Contact Us</a>
  </div>
</div>

<div class="page">
  <div class="page-title">Booking Requests</div>
  <div class="page-sub" id="page-sub">Manage your booking requests</div>

  <!-- Incoming (DJ only) -->
  <div id="incoming-section" style="display:none;margin-bottom:2rem;">
    <div style="font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--neon);margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);">Incoming Booking Requests</div>
    <div class="tabs" style="margin-bottom:1rem;">
      <button class="tab-btn active" id="in-tab-pending" onclick="switchTab('in','pending',this)">Pending</button>
      <button class="tab-btn" id="in-tab-approved" onclick="switchTab('in','approved',this)">Approved</button>
      <button class="tab-btn" id="in-tab-denied" onclick="switchTab('in','denied',this)">Denied</button>
      <button class="tab-btn" id="in-tab-all" onclick="switchTab('in','all',this)">All</button>
    </div>
    <div id="in-tab-pane-pending" class="tab-pane active"><div id="in-list-pending"></div></div>
    <div id="in-tab-pane-approved" class="tab-pane"><div id="in-list-approved"></div></div>
    <div id="in-tab-pane-denied" class="tab-pane"><div id="in-list-denied"></div></div>
    <div id="in-tab-pane-all" class="tab-pane"><div id="in-list-all"></div></div>
  </div>

  <!-- Outgoing (all roles) -->
  <div id="outgoing-section" style="display:none;">
    <div style="font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);">Outgoing Booking Requests</div>
    <div class="tabs" style="margin-bottom:1rem;">
      <button class="tab-btn active" id="out-tab-pending" onclick="switchTab('out','pending',this)">Pending</button>
      <button class="tab-btn" id="out-tab-counter" onclick="switchTab('out','counter',this)">Counter</button>
      <button class="tab-btn" id="out-tab-approved" onclick="switchTab('out','approved',this)">Approved</button>
      <button class="tab-btn" id="out-tab-denied" onclick="switchTab('out','denied',this)">Denied</button>
      <button class="tab-btn" id="out-tab-all" onclick="switchTab('out','all',this)">All</button>
    </div>
    <div id="out-tab-pane-pending" class="tab-pane active"><div id="out-list-pending"></div></div>
    <div id="out-tab-pane-counter" class="tab-pane"><div id="out-list-counter"></div></div>
    <div id="out-tab-pane-approved" class="tab-pane"><div id="out-list-approved"></div></div>
    <div id="out-tab-pane-denied" class="tab-pane"><div id="out-list-denied"></div></div>
    <div id="out-tab-pane-all" class="tab-pane"><div id="out-list-all"></div></div>
  </div>

</div>

<!-- Confirm Modal -->
<div id="confirm-modal" style="display:none;" class="modal-backdrop" onclick="if(event.target===this)closeConfirm()">
  <div class="modal-box" style="max-width:360px;">
    <div id="confirm-message" style="font-size:.95rem;color:var(--white);margin-bottom:1.5rem;line-height:1.5;"></div>
    <div style="display:flex;gap:.75rem;">
      <button id="confirm-cancel-btn" class="btn btn-outline" style="flex:1;" onclick="closeConfirm()">Cancel</button>
      <button id="confirm-ok-btn" class="btn btn-primary" style="flex:1;" onclick="confirmOk()">Confirm</button>
    </div>
  </div>
</div>

<!-- Counter Offer Modal -->
<div id="counter-modal" style="display:none;" class="modal-backdrop" onclick="if(event.target===this)closeCounter()">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div class="modal-title">Send Counter Offer</div>
      <button onclick="closeCounter()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;">✕</button>
    </div>
    <div id="counter-current-rate" style="display:none;background:var(--deep);border:1px solid var(--border);border-radius:6px;padding:.65rem .9rem;margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span id="counter-current-rate-label" style="font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);">Current Offer</span>
        <span id="counter-current-rate-val" style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--amber);"></span>
      </div>
    </div>
    <div class="form-row">
      <label>Your Counter Rate</label>
      <div style="display:flex;align-items:center;gap:.5rem;"><span id="counter-currency-sym" style="color:var(--muted);">$</span><input type="number" id="counter-amount" placeholder="Amount" min="0" style="flex:1;"></div>
    </div>
    <div class="form-row">
      <label>Message (optional)</label>
      <textarea id="counter-message" placeholder="Explain your counter offer..."></textarea>
    </div>
    <div id="counter-alert" style="margin-bottom:.75rem;"></div>

function formatDate(d) {
  if (!d) return '—';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const p = h < 12 ? 'AM' : 'PM';
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0') + ' ' + p;
}

let blockedUsers = [];
async function loadAllBookings() {
  // Fetch fresh blocked_users list for current user
  try {
    const { data: me } = await db.from('users').select('blocked_users').eq('id', currentUser.id).single();
    blockedUsers = me?.blocked_users || [];
  } catch(e) {}

  // Outgoing: requests this user made (as requester)
  const { data: outData } = await db.from('bookings').select('*').eq('requester_id', currentUser.id).order('created_at', { ascending: false });
  outgoingBookings = outData || [];
  // Back-fill dj_name for older bookings that don't have it
  const missingDjNames = outgoingBookings.filter(b => !b.dj_name && b.dj_id);
  if (missingDjNames.length > 0) {
    const djIds = [...new Set(missingDjNames.map(b => b.dj_id))];
    const { data: djRows } = await db.from('users').select('id,name').in('id', djIds);
    if (djRows) {
      const djMap = Object.fromEntries(djRows.map(d => [d.id, d.name]));
      outgoingBookings = outgoingBookings.map(b => b.dj_name ? b : {...b, dj_name: djMap[b.dj_id] || 'DJ'});
    }
  }
  if (currentUser.role !== 'dj' || outgoingBookings.length > 0) {
    document.getElementById('outgoing-section').style.display = 'block';
    renderList('out', 'pending');
  }

  // Incoming: requests made to this DJ (club/bar DJs only)
  if (isClubBarDJ) {
    const { data: inData } = await db.from('bookings').select('*').eq('dj_id', currentUser.id).order('created_at', { ascending: false });
    // Filter out bookings from blocked users
    incomingBookings = (inData || []).filter(b => !blockedUsers.includes(b.requester_id));
    // Back-fill requester_name for older bookings
    const missingNames = incomingBookings.filter(b => !b.requester_name && b.requester_id);
    if (missingNames.length > 0) {
      const rIds = [...new Set(missingNames.map(b => b.requester_id))];
      const { data: rRows } = await db.from('users').select('id,name').in('id', rIds);
      if (rRows) {
        const rMap = Object.fromEntries(rRows.map(r => [r.id, r.name]));
        incomingBookings = incomingBookings.map(b => b.requester_name ? b : {...b, requester_name: rMap[b.requester_id] || 'Unknown'});
      }
    }
    renderList('in', 'pending');
  }
  updateTabCounts();
}

function timeToMins(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function bookingsOverlap(a, b) {
  if (!a.start_time || !b.start_time) return true;
  const aStart = timeToMins(a.start_time);
  const aEnd = a.end_time ? timeToMins(a.end_time) : null;
  const bStart = timeToMins(b.start_time);
  const bEnd = b.end_time ? timeToMins(b.end_time) : null;
  const aEndAdj = aEnd !== null ? (aEnd <= aStart ? aEnd + 1440 : aEnd) : aStart + 1440;
  const bEndAdj = bEnd !== null ? (bEnd <= bStart ? bEnd + 1440 : bEnd) : bStart + 1440;
  return aStart < bEndAdj && bStart < aEndAdj;
}

async function fetchVenueDistance(addr1, addr2, elementId) {
  try {
    const geo = async (addr) => {
      const r = await fetch(`/.netlify/functions/geocode?address=${encodeURIComponent(addr)}`);
      if (!r.ok) return null;
      const d = await r.json();
      return d.lat ? d : null;
    };
    const [p1, p2] = await Promise.all([geo(addr1), geo(addr2)]);
    const el = document.getElementById(elementId);
    if (!el) return;
    if (!p1 || !p2) { el.style.display = 'none'; return; }
    const R = 3958.8;
    const dLat = (p2.lat - p1.lat) * Math.PI / 180;
    const dLon = (p2.lon - p1.lon) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180) * Math.cos(p2.lat*Math.PI/180) * Math.sin(dLon/2)**2;
    const miles = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const distColor = miles < 5 ? 'var(--neon)' : miles < 15 ? 'var(--amber)' : 'var(--error)';
    el.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${distColor}" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span style="color:${distColor};">${miles.toFixed(1)} mi between venues</span>`;
  } catch(e) {
    const el = document.getElementById(elementId);
    if (el) el.style.display = 'none';
  }
}

function updateTabCounts() {
  const inCounts = { pending: 0, approved: 0, denied: 0, counter: 0, cancelled: 0 };
  incomingBookings.forEach(b => { if (inCounts[b.status] !== undefined) inCounts[b.status]++; });
  inCounts.all = inCounts.pending + inCounts.approved + inCounts.denied + inCounts.counter;
  ['pending','approved','denied','all'].forEach(f => {
    const btn = document.getElementById(`in-tab-${f}`);
    if (btn) btn.textContent = f.charAt(0).toUpperCase() + f.slice(1) + ` (${inCounts[f]})`;
  });

  const outCounts = { pending: 0, counter: 0, approved: 0, denied: 0, cancelled: 0 };
  outgoingBookings.forEach(b => { if (outCounts[b.status] !== undefined) outCounts[b.status]++; });
  outCounts.all = outCounts.pending + outCounts.counter + outCounts.approved + outCounts.denied;
  ['pending','counter','approved','denied','all'].forEach(f => {
    const btn = document.getElementById(`out-tab-${f}`);
    if (btn) btn.textContent = f.charAt(0).toUpperCase() + f.slice(1) + ` (${outCounts[f]})`;
  });
}

function renderList(group, filter) {
  const bookings = group === 'in' ? incomingBookings : outgoingBookings;
  const list = document.getElementById(`${group}-list-${filter}`);
  if (!list) return;
  const items = filter === 'all' ? bookings.filter(b => b.status !== 'cancelled') : bookings.filter(b => b.status === filter);
  if (!items.length) { list.innerHTML = `<div class="empty-state">No ${filter} requests</div>`; return; }

  const isIncoming = group === 'in';

  // Same-day grouping for incoming pending only
  if (isIncoming && filter === 'pending') {
    const groups = {};
    items.forEach(b => {
      const key = b.event_date || 'no-date';
      if (!groups[key]) groups[key] = [];
      groups[key].push(b);
    });
    Object.values(groups).forEach(g => g.sort((a, b) => new Date(a.created_at) - new Date(b.created_at)));
    const sortedGroups = Object.values(groups).sort((a, b) => new Date(a[0].created_at) - new Date(b[0].created_at));

    list.innerHTML = sortedGroups.map(group => {
      const hasMultiple = group.length > 1;
      const hasOverlap = hasMultiple && group.some((a, i) => group.slice(i+1).some(b => bookingsOverlap(a, b)));

      // Build logistics info for multi-booking groups
      let logisticsHtml = '';
      if (hasMultiple && group.length === 2) {
        const [a, b] = group;
        // Time gap: end of first booking to start of second
        if (a.start_time && a.end_time && b.start_time) {
          const aStartMins = timeToMins(a.start_time);
          let aEndMins = timeToMins(a.end_time);
          const bStartMins = timeToMins(b.start_time);
          if (aEndMins < aStartMins) aEndMins += 1440;
          const gapMins = bStartMins - aEndMins;
          if (gapMins < 0) {
            logisticsHtml += `<span style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--error);"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>SETS OVERLAP</span>`;
          } else {
            const gapHrs = Math.floor(gapMins / 60);
            const gapRemMins = gapMins % 60;
            const gapLabel = gapHrs > 0 ? `${gapHrs}h${gapRemMins > 0 ? ' ' + gapRemMins + 'm' : ''}` : `${gapRemMins}m`;
            const gapColor = gapMins < 60 ? 'var(--amber)' : 'var(--neon)';
            logisticsHtml += `<span style="font-family:'Space Mono',monospace;font-size:.65rem;color:${gapColor};"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${gapLabel} GAP BETWEEN SETS</span>`;
          }
        }
        if (a.venue_address && b.venue_address) {
          const groupId = `logistics-${a.id}-${b.id}`;
          logisticsHtml += `<span id="${groupId}" style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Calculating distance...</span>`;
          setTimeout(() => fetchVenueDistance(a.venue_address, b.venue_address, groupId), 100);
        }
      }

      const logisticsBar = logisticsHtml ? `<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:.4rem .75rem;background:rgba(255,255,255,.03);border-radius:5px;margin-bottom:.5rem;">${logisticsHtml}</div>` : '';

      const groupHeader = hasMultiple ? `
        <div style="display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;background:${hasOverlap ? 'rgba(255,179,71,.08)' : 'rgba(0,245,196,.06)'};border:1px solid ${hasOverlap ? 'rgba(255,179,71,.25)' : 'rgba(0,245,196,.2)'};border-radius:6px;margin-bottom:.5rem;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${hasOverlap ? 'var(--amber)' : 'var(--neon)'}" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span style="font-family:'Space Mono',monospace;font-size:.56rem;color:${hasOverlap ? 'var(--amber)' : 'var(--neon)'};letter-spacing:.06em;">
            ${hasOverlap
              ? `${group.length} OVERLAPPING REQUESTS FOR ${formatDate(group[0].event_date).toUpperCase()} — ORDER RECEIVED`
              : `${group.length} REQUESTS FOR ${formatDate(group[0].event_date).toUpperCase()} — TIMES DON'T OVERLAP, CAN ACCEPT BOTH`}
          </span>
        </div>` : '';

      const cards = group.map((b, idx) => renderCard(b, true, hasMultiple ? idx + 1 : null)).join('');

      return hasMultiple
        ? `<div style="border:1px solid ${hasOverlap ? 'rgba(255,179,71,.2)' : 'rgba(0,245,196,.15)'};border-radius:8px;padding:.75rem;margin-bottom:1rem;background:${hasOverlap ? 'rgba(255,179,71,.02)' : 'rgba(0,245,196,.02)'};">${groupHeader}${logisticsBar}${cards}</div>`
        : cards;
    }).join('');
    return;
  }
  list.innerHTML = items.map(b => renderCard(b, isIncoming, null)).join('');
}

function renderCard(b, isIncoming, orderNum) {
    const sym = currencySymbols[b.currency || 'USD'] || '$';
    const statusClass = 'status-' + (b.status || 'pending');
    const cardClass = 'request-card ' + (b.status || 'pending');
    const agreedRate = b.counter_rate || b.quoted_rate || b.offer_amount;
    const isApproved = b.status === 'approved';
    const orderBadge = orderNum ? `<span style="font-family:'Space Mono',monospace;font-size:.48rem;background:rgba(255,179,71,.15);color:var(--amber);border:1px solid rgba(255,179,71,.3);border-radius:3px;padding:1px 5px;margin-right:.4rem;">#${orderNum}</span>` : '';

    // Negotiation log entries — use negotiation_log array if available, fall back to legacy fields
    const logEntries = [];
    if (b.negotiation_log && b.negotiation_log.length > 0) {
      b.negotiation_log.forEach((entry, i) => {
        const isLast = i === b.negotiation_log.length - 1;
        const fromLabel = entry.from === 'dj' ? 'DJ' : 'Booker';
        const color = entry.from === 'dj' ? 'var(--neon)' : 'var(--amber)';
        logEntries.push(`<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;${isLast && isApproved ? '' : 'border-bottom:1px solid var(--border);'}font-size:.75rem;">
          <span style="color:${color};font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;">Counter Offer <span style="color:var(--white);">(${fromLabel})</span></span>
          <span style="color:${color};font-weight:600;">${sym}${Number(entry.amount).toLocaleString()} ${b.currency||'USD'}${entry.message ? ' <span style="color:var(--muted);font-size:.7rem;font-style:italic;">"'+entry.message+'"</span>' : ''}</span>
        </div>`);
      });
    } else {
      // Legacy: single counter_rate field
      if (b.offer_amount) logEntries.push(`<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.75rem;"><span style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;">Initial Offer <span style="color:var(--white);">(${isIncoming ? 'Booker' : 'You'})</span></span><span style="color:var(--white);font-weight:600;">${sym}${Number(b.offer_amount).toLocaleString()} ${b.currency||'USD'}</span></div>`);
      if (b.quoted_rate && !b.offer_amount) logEntries.push(`<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.75rem;"><span style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;">Quoted Rate <span style="color:var(--white);">(${isIncoming ? 'Booker' : 'You'})</span></span><span style="color:var(--white);font-weight:600;">${sym}${Number(b.quoted_rate).toLocaleString()} ${b.currency||'USD'}</span></div>`);
      if (b.counter_rate) logEntries.push(`<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;${isApproved ? '' : 'border-bottom:1px solid var(--border);'}font-size:.75rem;"><span style="color:var(--neon);font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;">Counter Offer <span style="color:var(--white);">(DJ)</span></span><span style="color:var(--neon);font-weight:600;">${sym}${Number(b.counter_rate).toLocaleString()} ${b.currency||'USD'}${b.counter_message ? ' <span style="color:var(--muted);font-size:.7rem;font-style:italic;">"'+b.counter_message+'"</span>' : ''}</span></div>`);
    }

    const rateDisplay = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem .75rem;margin-bottom:.85rem;align-items:center;">
        <div>
          <span class="lbl">Equipment:</span><span class="val" style="display:block;font-size:.78rem;">${equipLabels[b.equipment] || b.equipment || '—'}</span>
        </div>
        <div style="text-align:right;">
          ${isApproved && agreedRate ? `
            <div style="border:1px solid var(--neon);border-radius:8px;padding:.5rem .75rem;background:rgba(0,245,196,.05);display:inline-block;">
              <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem;">
                <div style="width:16px;height:16px;border-radius:50%;background:var(--neon);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#050507" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span style="font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--neon);">Offer Accepted</span>
              </div>
              <span style="display:block;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:var(--white);line-height:1.1;">${sym}${Number(agreedRate).toLocaleString()} <span style="font-size:.9rem;color:var(--muted);">${b.currency||'USD'}</span></span>
            </div>` : agreedRate ? `<span style="display:block;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:${b.status==='denied'||b.status==='cancelled'?'var(--error)':'var(--amber)'};line-height:1.1;">${b.counter_rate ? 'Counter: ' : 'Offer: '}${sym}${Number(agreedRate).toLocaleString()}</span>` : b.allow_offers || b.quoted_rate === null ? `<span style="display:block;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);">Open to Offers</span>` : ''}
        </div>
      </div>`;

    return `<div class="${cardClass}" id="card-${b.id}">
      <div class="req-header">
        <div>
          <div style="display:inline-block;font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.06em;color:var(--neon);background:rgba(0,245,196,.08);border:1px solid rgba(0,245,196,.25);border-radius:5px;padding:.2rem .6rem;margin-bottom:.45rem;">${formatDate(b.event_date)}${b.start_time ? ' · ' + formatTime(b.start_time) + (b.end_time ? ' – ' + formatTime(b.end_time) : '') : ''}</div>
          <div class="req-name">${orderBadge}<span style="font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;margin-right:.5rem;">Venue:</span>${b.venue_name || 'Unnamed Venue'}</div>
          <div style="font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:3px;">Venue is: <span style="color:var(--white);">${b.venue_type === 'club' ? 'Club' : 'Bar'}</span></div>
          ${b.venue_address ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(b.venue_address)}" target="_blank" style="font-size:.78rem;color:var(--muted);text-decoration:underline;text-underline-offset:3px;line-height:1.4;display:block;margin-top:3px;">${b.venue_address.replace(/,\s*[^,]+ County/i,'')}</a>` : ''}
          ${b.set_type ? `<div style="font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--neon);margin-top:6px;">Set: ${setTypeLabels[b.set_type] || b.set_type}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;">
          <span class="${statusClass} status-badge">${b.status || 'pending'}</span>
          <span style="font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.05em;color:var(--muted);">${isIncoming ? 'From: ' : 'To: '}<span style="color:var(--white);">${isIncoming ? (b.requester_name && b.requester_name !== 'none' ? b.requester_name : 'Unknown') : (b.dj_name && b.dj_name !== 'none' ? b.dj_name : 'DJ')}</span></span>
          ${(() => {
            const targetId = isIncoming ? b.requester_id : b.dj_id;
            const targetName = isIncoming ? (b.requester_name||'this user') : (b.dj_name||'this DJ');
            const isBlocked = blockedUsers.includes(targetId);
            return isBlocked
              ? `<button class="btn btn-sm" style="font-size:.5rem;padding:.2rem .5rem;background:transparent;border:1px solid var(--muted);color:var(--muted);font-weight:700;" onclick="unblockUserInline('${targetId}')">Unblock</button>`
              : `<button class="btn btn-sm" style="font-size:.5rem;padding:.2rem .5rem;background:var(--error);border-color:var(--error);color:var(--white);font-weight:700;" onclick="blockUser('${targetId}','${targetName}')">Block User</button>`;
          })()}
        </div>
      </div>
      ${rateDisplay}
      ${b.notes ? `<div class="req-notes">"${b.notes}"</div>` : ''}
      ${(b.negotiation_log?.length > 0 || b.counter_rate) && logEntries.length > 0 ? `
        <div style="margin-top:.75rem;padding:.75rem;background:var(--deep);border-radius:8px;border:1px solid var(--border);">
          <div style="font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;">Negotiation Log</div>
          ${logEntries.join('')}
        </div>` : ''}
      <div class="req-actions">
        ${isIncoming && b.status === 'pending' ? `
          <button class="btn btn-primary btn-sm" onclick="updateStatus('${b.id}','approved')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Approve
          </button>
          <button class="btn btn-danger btn-sm" onclick="updateStatus('${b.id}','denied')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Deny
          </button>
          <button class="btn btn-amber btn-sm" onclick="openCounter('${b.id}','${b.currency||'USD'}','in',${b.counter_rate||'null'},${b.offer_amount||'null'},${b.quoted_rate||'null'})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Counter
          </button>
        ` : ''}
        ${!isIncoming && (b.status === 'pending' || b.status === 'counter') ? `
          <button class="btn btn-danger btn-sm" onclick="cancelOffer('${b.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel Offer
          </button>
        ` : ''}
        ${!isIncoming && b.status === 'counter' ? `
          <button class="btn btn-primary btn-sm" onclick="requesterUpdateStatus('${b.id}','approved')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Accept
          </button>
          <button class="btn btn-danger btn-sm" onclick="requesterUpdateStatus('${b.id}','denied')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Decline
          </button>
          <button class="btn btn-amber btn-sm" onclick="openCounter('${b.id}','${b.currency||'USD'}','out',${b.counter_rate||'null'},${b.offer_amount||'null'},${b.quoted_rate||'null'})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Counter Back
          </button>
        ` : ''}
        <button class="btn btn-outline btn-sm" onclick="openMsg('${b.id}','${isIncoming ? b.requester_id : b.dj_id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Message
        </button>
      </div>
      <div style="text-align:right;font-family:'Space Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:.6rem;letter-spacing:.04em;">Requested ${new Date(b.created_at).toLocaleDateString()}</div>
    </div>`;
}

let _confirmCallback = null;
function showConfirm(message, okLabel, okStyle, callback) {
  document.getElementById('confirm-message').textContent = message;
  const okBtn = document.getElementById('confirm-ok-btn');
  okBtn.textContent = okLabel || 'Confirm';
  okBtn.className = 'btn ' + (okStyle || 'btn-primary');
  okBtn.setAttribute('style', 'flex:1;');
  _confirmCallback = callback;
  document.getElementById('confirm-modal').style.display = 'flex';
}
function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; _confirmCallback = null; }
function confirmOk() { const cb = _confirmCallback; closeConfirm(); if (cb) cb(); }

async function updateStatus(bookingId, status) {
  const label = status === 'approved' ? 'Approve' : 'Deny';
  const style = status === 'approved' ? 'btn-primary' : 'btn-danger';
  const msg = status === 'approved' ? 'Approve this booking request?' : 'Deny this booking request?';
  showConfirm(msg, label, style, () => _doUpdateStatus(bookingId, status));
}

async function _doUpdateStatus(bookingId, status) {
  try {
    const { error } = await db.from('bookings').update({ status, updated_at: new Date().toISOString() }).eq('id', bookingId).eq('dj_id', currentUser.id);
    if (error) throw error;
    const b = incomingBookings.find(x => x.id === bookingId);
    if (b) b.status = status;

    // If approved, mark the date as booked on the DJ's calendar
    if (status === 'approved' && b && b.event_date) {
      try {
        const { data: djRow } = await db.from('users').select('booking_settings').eq('id', currentUser.id).single();
        const bs = djRow && djRow.booking_settings ? (typeof djRow.booking_settings === 'string' ? JSON.parse(djRow.booking_settings) : djRow.booking_settings) : {};
        if (!bs.booking_days) bs.booking_days = {};
        bs.booking_days[b.event_date] = {
          booked: true,
          eventName: b.venue_name || '',
          location: b.venue_address || '',
          startTime: b.start_time || '',
          endTime: b.end_time || '',
          bookingId: b.id,
        };
        await db.from('users').update({ booking_settings: JSON.stringify(bs) }).eq('id', currentUser.id);
      } catch(calErr) { console.error('Calendar update failed:', calErr); }
    }

    // Send email notifications
    if (b) {
      const { data: requester } = await db.from('users').select('email,name').eq('id', b.requester_id).single();

      if (requester?.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            type: 'booking_status',
            requesterName: requester.name,
            requesterEmail: requester.email,
            djName: currentUser.name,
            status,
            eventDate: b.event_date,
            venueName: b.venue_name,
            venueAddress: b.venue_address,
            venueType: b.venue_type,
            setType: b.set_type,
            startTime: b.start_time,
            endTime: b.end_time,
            equipment: b.equipment,
            notes: b.notes,
            quotedRate: b.quoted_rate,
            offerAmount: b.offer_amount,
            currency: b.currency,
          })
        }).catch(e => console.warn('Requester status email failed:', e));
      }

      if (currentUser.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            type: 'booking_dj_confirm',
            djName: currentUser.name,
            djEmail: currentUser.email,
            requesterName: requester?.name || 'The requester',
            status,
            eventDate: b.event_date,
            venueName: b.venue_name,
            venueAddress: b.venue_address,
            venueType: b.venue_type,
            setType: b.set_type,
            startTime: b.start_time,
            endTime: b.end_time,
            equipment: b.equipment,
            notes: b.notes,
            quotedRate: b.quoted_rate,
            offerAmount: b.offer_amount,
            currency: b.currency,
          })
        }).catch(e => console.warn('DJ confirm email failed:', e));
      }
    }

    // Re-render the active incoming tab
    const activeInBtn = document.querySelector('#incoming-section .tab-btn.active');
    if (activeInBtn) {
      const activeFilter = activeInBtn.id.replace('in-tab-','');
      renderList('in', activeFilter); updateTabCounts();
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function openCounter(bookingId, currency, group, counterRate, offerAmount, quotedRate) {
  activeCounterBookingId = bookingId;
  activeCounterGroup = group;
  const sym = currencySymbols[currency] || '$';
  document.getElementById('counter-currency-sym').textContent = sym;
  document.getElementById('counter-amount').value = '';
  document.getElementById('counter-message').value = '';
  document.getElementById('counter-alert').innerHTML = '';
  const rateEl = document.getElementById('counter-current-rate');
  const rateValEl = document.getElementById('counter-current-rate-val');
  const rateLabelEl = document.getElementById('counter-current-rate-label');
  const currentRate = counterRate || offerAmount || quotedRate;
  const label = counterRate ? 'Last Counter' : offerAmount ? 'Their Offer' : 'Quoted Rate';
  if (currentRate && rateEl && rateValEl) {
    if (rateLabelEl) rateLabelEl.textContent = label;
    rateValEl.textContent = sym + Number(currentRate).toLocaleString() + ' ' + currency;
    rateEl.style.display = 'block';
  } else if (rateEl) {
    rateEl.style.display = 'none';
  }
  document.getElementById('counter-modal').style.display = 'flex';
}
function closeCounter() { document.getElementById('counter-modal').style.display = 'none'; }

async function submitCounter() {
  const amount = document.getElementById('counter-amount').value;
  const message = document.getElementById('counter-message').value.trim();
  const alertEl = document.getElementById('counter-alert');
  if (!amount) { alertEl.innerHTML = '<div class="alert alert-error">Enter a counter amount.</div>'; return; }
  try {
    if (activeCounterGroup === 'in') {
      // DJ countering — fetch current log, append entry
      const { data: current } = await db.from('bookings').select('negotiation_log').eq('id', activeCounterBookingId).single();
      const log = current?.negotiation_log || [];
      log.push({ from: 'dj', amount: Number(amount), message, created_at: new Date().toISOString() });
      const { error } = await db.from('bookings').update({ status: 'counter', counter_rate: amount, counter_message: message, negotiation_log: log, updated_at: new Date().toISOString() }).eq('id', activeCounterBookingId).eq('dj_id', currentUser.id);
      if (error) throw error;
      const b = incomingBookings.find(x => x.id === activeCounterBookingId);
      if (b) { b.status = 'counter'; b.counter_rate = amount; b.counter_message = message; b.negotiation_log = log; }
      if (b) {
        const { data: requester } = await db.from('users').select('email,name').eq('id', b.requester_id).single();
        if (requester?.email) {
          fetch('/.netlify/functions/send-email', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ type: 'booking_counter', recipientName: requester.name, recipientEmail: requester.email, senderName: currentUser.name, fromRole: 'dj', counterRate: amount, counterMessage: message, eventDate: b.event_date, venueName: b.venue_name, currency: b.currency })
          }).catch(() => {});
        }
      }
      closeCounter();
      const activeInBtn = document.querySelector('#incoming-section .tab-btn.active');
      if (activeInBtn) renderList('in', activeInBtn.id.replace('in-tab-','')); updateTabCounts();
    } else {
      // Booker countering back — fetch current log, append entry
      const { data: current } = await db.from('bookings').select('negotiation_log').eq('id', activeCounterBookingId).single();
      const log = current?.negotiation_log || [];
      log.push({ from: 'booker', amount: Number(amount), message, created_at: new Date().toISOString() });
      const { error } = await db.from('bookings').update({ status: 'pending', counter_rate: amount, counter_message: message, negotiation_log: log, updated_at: new Date().toISOString() }).eq('id', activeCounterBookingId).eq('requester_id', currentUser.id);
      if (error) throw error;
      const b = outgoingBookings.find(x => x.id === activeCounterBookingId);
      if (b) { b.status = 'pending'; b.counter_rate = amount; b.counter_message = message; b.negotiation_log = log; }
      if (b) {
        const { data: dj } = await db.from('users').select('email,name').eq('id', b.dj_id).single();
        if (dj?.email) {
          fetch('/.netlify/functions/send-email', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ type: 'booking_counter', recipientName: dj.name, recipientEmail: dj.email, senderName: currentUser.name, fromRole: 'booker', counterRate: amount, counterMessage: message, eventDate: b.event_date, venueName: b.venue_name, currency: b.currency })
          }).catch(() => {});
        }
      }
      closeCounter();
      const activeOutBtn = document.querySelector('#outgoing-section .tab-btn.active');
      if (activeOutBtn) renderList('out', activeOutBtn.id.replace('out-tab-','')); updateTabCounts();
    }
  } catch(e) { alertEl.innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; }
}

async function requesterUpdateStatus(bookingId, status) {
  const label = status === 'approved' ? 'Accept' : 'Decline';
  const style = status === 'approved' ? 'btn-primary' : 'btn-danger';
  const msg = status === 'approved' ? 'Accept this counter offer?' : 'Decline this counter offer?';
  showConfirm(msg, label, style, () => _doRequesterUpdateStatus(bookingId, status));
}

async function _doRequesterUpdateStatus(bookingId, status) {
  try {
    const { error } = await db.from('bookings').update({ status, updated_at: new Date().toISOString() }).eq('id', bookingId).eq('requester_id', currentUser.id);
    if (error) throw error;
    const b = outgoingBookings.find(x => x.id === bookingId);
    if (b) b.status = status;
    // Email DJ
    if (b) {
      const { data: dj } = await db.from('users').select('email,name').eq('id', b.dj_id).single();
      if (dj?.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            type: 'booking_dj_confirm', djName: dj.name, djEmail: dj.email,
            requesterName: currentUser.name, status,
            eventDate: b.event_date, venueName: b.venue_name, venueAddress: b.venue_address,
            venueType: b.venue_type, setType: b.set_type, startTime: b.start_time,
            endTime: b.end_time, equipment: b.equipment, notes: b.notes,
            quotedRate: b.quoted_rate, offerAmount: b.offer_amount, currency: b.currency,
          })
        }).catch(() => {});
      }
      // Email booker confirmation
      if (currentUser.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            type: 'booking_status', requesterName: currentUser.name, requesterEmail: currentUser.email,
            djName: dj?.name || '', status,
            eventDate: b.event_date, venueName: b.venue_name, venueAddress: b.venue_address,
            venueType: b.venue_type, setType: b.set_type, startTime: b.start_time,
            endTime: b.end_time, equipment: b.equipment, notes: b.notes,
            quotedRate: b.counter_rate || b.quoted_rate, offerAmount: b.offer_amount, currency: b.currency,
          })
        }).catch(() => {});
      }
    }
    const activeOutBtn = document.querySelector('#outgoing-section .tab-btn.active');
    if (activeOutBtn) renderList('out', activeOutBtn.id.replace('out-tab-','')); updateTabCounts();
  } catch(e) { alert('Error: ' + e.message); }
}

async function unblockUserInline(userId) {
  try {
    const updated = blockedUsers.filter(id => id !== userId);
    await db.from('users').update({ blocked_users: updated }).eq('id', currentUser.id);
    blockedUsers = updated;
    const activeInBtn = document.querySelector('#incoming-section .tab-btn.active');
    if (activeInBtn) renderList('in', activeInBtn.id.replace('in-tab-',''));
    const activeOutBtn = document.querySelector('#outgoing-section .tab-btn.active');
    if (activeOutBtn) renderList('out', activeOutBtn.id.replace('out-tab-',''));
  } catch(e) { alert('Error: ' + e.message); }
}

async function blockUser(userId, userName) {
  showConfirm(`Block ${userName}? They will no longer be able to send you booking requests or messages.`, 'Block User', 'btn-danger', () => _doBlockUser(userId, userName));
}

async function _doBlockUser(userId, userName) {
  try {
    const updatedBlocked = [...new Set([...blockedUsers, userId])];
    const { error } = await db.from('users').update({ blocked_users: updatedBlocked }).eq('id', currentUser.id);
    if (error) throw error;
    blockedUsers = updatedBlocked;
    // Deny any pending incoming bookings from this user
    await db.from('bookings').update({ status: 'denied', updated_at: new Date().toISOString() })
      .eq('requester_id', userId).eq('dj_id', currentUser.id).eq('status', 'pending');
    incomingBookings = incomingBookings.map(b => b.requester_id === userId && b.status === 'pending' ? {...b, status: 'denied'} : b);
    const activeInBtn = document.querySelector('#incoming-section .tab-btn.active');
    if (activeInBtn) renderList('in', activeInBtn.id.replace('in-tab-','')); updateTabCounts();
    const activeOutBtn = document.querySelector('#outgoing-section .tab-btn.active');
    if (activeOutBtn) renderList('out', activeOutBtn.id.replace('out-tab-','')); updateTabCounts();
  } catch(e) { alert('Error: ' + e.message); }
}

async function cancelOffer(bookingId) {
  showConfirm('Cancel this booking request? The DJ will be notified.', 'Cancel Request', 'btn-danger', () => _doCancelOffer(bookingId));
}

async function _doCancelOffer(bookingId) {
  try {
    const { error } = await db.from('bookings').update({ status: 'cancelled', updated_at: new Date().toISOString() }).eq('id', bookingId).eq('requester_id', currentUser.id);
    if (error) throw error;
    const b = outgoingBookings.find(x => x.id === bookingId);
    if (b) b.status = 'cancelled';
    if (b) {
      const { data: dj } = await db.from('users').select('email,name').eq('id', b.dj_id).single();
      const emailPayload = {
        type: 'booking_cancelled',
        requesterName: currentUser.name,
        djName: dj?.name || b.dj_name || 'DJ',
        eventDate: b.event_date,
        venueName: b.venue_name,
        venueAddress: b.venue_address,
        venueType: b.venue_type,
        setType: b.set_type,
        startTime: b.start_time,
        endTime: b.end_time,
        currency: b.currency,
      };
      if (dj?.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ...emailPayload, recipientName: dj.name, recipientEmail: dj.email, recipientRole: 'dj' })
        }).catch(() => {});
      }
      if (currentUser.email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ...emailPayload, recipientName: currentUser.name, recipientEmail: currentUser.email, recipientRole: 'requester' })
        }).catch(() => {});
      }
    }
    const activeOutBtn = document.querySelector('#outgoing-section .tab-btn.active');
    if (activeOutBtn) renderList('out', activeOutBtn.id.replace('out-tab-','')); updateTabCounts();
  } catch(e) { alert('Error: ' + e.message); }
}

function openMsg(bookingId, userId) {
  activeMsgBookingId = bookingId;
  activeMsgUserId = userId;
  document.getElementById('msg-body').value = '';
  document.getElementById('msg-alert').innerHTML = '';
  document.getElementById('msg-modal').style.display = 'flex';
}
function closeMsg() { document.getElementById('msg-modal').style.display = 'none'; }

async function sendMsg() {
  const body = document.getElementById('msg-body').value.trim();
  const alertEl = document.getElementById('msg-alert');
  if (!body) { alertEl.innerHTML = '<div class="alert alert-error">Enter a message.</div>'; return; }
  try {
    const { error } = await db.from('messages').insert({ from_user_id: currentUser.id, to_user_id: activeMsgUserId, from_name: currentUser.name, subject: 'Re: Your Booking Request', message: body, read: false });
    if (error) throw error;
    alertEl.innerHTML = '<div class="alert alert-success">✓ Message sent!</div>';
    setTimeout(() => closeMsg(), 1500);
  } catch(e) { alertEl.innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; }
}

if (currentUser) loadAllBookings();
