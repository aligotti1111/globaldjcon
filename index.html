<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #050507;
    --deep: #0a0a10;
    --card: #13131e;
    --border: #1e1e30;
    --neon: #00f5c4;
    --neon-dim: rgba(0,245,196,0.12);
    --pink: #ff2d78;
    --pink-dim: rgba(255,45,120,0.12);
    --amber: #ffb830;
    --white: #f0f0f8;
    --muted: #6b6b88;
    --success: #3ddc84;
    --error: #ff5f5f;
    --admin: #a78bfa;
    --admin-dim: rgba(167,139,250,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.4; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); }

  .view { display:none; }
  .view.active { display:block; }

  /* ── BUTTONS ── */
  .btn { display:inline-flex; align-items:center; gap:.45rem; padding:.65rem 1.2rem; border-radius:6px; font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border:none; transition:all .2s; white-space:nowrap; }
  .btn svg { width:14px; height:14px; flex-shrink:0; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-outline:hover { border-color:var(--neon); color:var(--neon); }
  .btn-primary { background:var(--neon); border:1px solid var(--neon); color:var(--black); font-weight:700; }
  .btn-primary:hover { opacity:.85; }
  .btn-admin { background:var(--admin-dim); border:1px solid var(--admin); color:var(--admin); }
  .btn-admin:hover { background:rgba(167,139,250,.22); }
  .btn-danger { background:transparent; border:1px solid rgba(255,95,95,.35); color:var(--error); }
  .btn-danger:hover { border-color:var(--error); background:rgba(255,95,95,.08); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--admin); color:var(--admin); }

  /* ═══════════════════════════════
     PUBLIC VIEW
  ═══════════════════════════════ */
  #view-public header { position:relative; padding:3rem 4rem 2.5rem; border-bottom:1px solid var(--border); overflow:hidden; }
  #view-public header::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--neon),var(--pink),transparent); animation:scanline 4s ease-in-out infinite; }
  @keyframes scanline { 0%,100%{opacity:.4;transform:scaleX(.3)} 50%{opacity:1;transform:scaleX(1)} }
  .header-bg { position:absolute; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(0,245,196,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(255,45,120,.05) 0%,transparent 50%); }
  .header-inner { position:relative; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:1.5rem; }
  .eyebrow { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.25em; color:var(--neon); text-transform:uppercase; margin-bottom:.4rem; opacity:.8; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,4vw,3.2rem); line-height:.85; background:linear-gradient(135deg,var(--white) 30%,var(--neon) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .tagline { font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; margin-top:.6rem; }
  .admin-link { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid transparent; border-radius:4px; padding:.4rem .7rem; cursor:pointer; transition:all .25s; opacity:.4; }
  .admin-link:hover { opacity:1; border-color:var(--admin); color:var(--admin); }

  /* controls */
  .controls { padding:1.5rem 4rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; background:var(--deep); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
  .search-wrap { position:relative; flex:1; min-width:220px; max-width:380px; }
  .country-indicator { position:absolute; right:8px; top:50%; transform:translateY(-50%); display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--deep); border:1px solid var(--border); border-radius:5px; padding:.15rem .4rem; transition:all .2s; line-height:1; z-index:2; }
  .country-indicator:hover { border-color:var(--neon); }
  .country-menu { position:absolute; top:calc(100% + 6px); right:0; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:.4rem; z-index:200; min-width:180px; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .country-option { display:flex; align-items:center; gap:.6rem; padding:.5rem .75rem; border-radius:5px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.85rem; color:var(--white); transition:background .15s; white-space:nowrap; }
  .country-option:hover { background:var(--deep); }
  .country-option.selected { background:var(--neon-dim); color:var(--neon); }
  .search-wrap svg { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--muted); width:15px; height:15px; pointer-events:none; }
  input[type="search"] { width:100%; padding:.7rem 4.5rem .7rem 2.8rem; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; transition:border-color .2s,box-shadow .2s; }
  input[type="search"]::-webkit-search-cancel-button { display:none; }
  input[type="search"]::-webkit-search-decoration { display:none; }
  input[type="search"]:focus { border-color:var(--neon); box-shadow:0 0 0 3px rgba(0,245,196,.07); }
  input[type="search"]::placeholder { color:var(--muted); }
  .filter-pills { display:flex; gap:.5rem; flex-wrap:wrap; }
  .pill { padding:.5rem 1.1rem; border-radius:100px; font-family:'Space Mono',monospace; font-size:.67rem; letter-spacing:.08em; text-transform:uppercase; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all .2s; }
  .pill:hover { border-color:var(--neon); color:var(--neon); }
  .pill.active { background:var(--neon); border-color:var(--neon); color:var(--black); font-weight:700; box-shadow:0 0 12px rgba(0,245,196,.3); }
  .pill.pink:hover { border-color:var(--pink); color:var(--pink); }
  .pill.pink.active { background:var(--pink); border-color:var(--pink); color:#fff; font-weight:700; box-shadow:0 0 12px rgba(255,45,120,.3); }
  .controls-right { margin-left:auto; display:flex; align-items:center; gap:.75rem; }
  .count-badge { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); }
  .count-badge span { color:var(--neon); font-size:.8rem; }
  .sort-select { padding:.55rem 2rem .55rem .85rem; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--muted); font-family:'Space Mono',monospace; font-size:.63rem; letter-spacing:.07em; outline:none; cursor:pointer; transition:border-color .2s; appearance:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%236b6b88' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right .5rem center; background-size:12px; }
  .sort-select:focus { border-color:var(--neon); }
  .sort-select option { background:var(--card); color:var(--white); }
  .location-group-header { grid-column:1/-1; font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); padding:.5rem 0 .75rem; border-bottom:1px solid var(--border); margin-bottom:-.2rem; display:flex; align-items:center; gap:.6rem; }
  .location-group-header::before { content:'📍'; font-size:.8rem; }

  /* public grid */
  .main { padding:2.5rem 4rem 5rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.2rem; }
  .grid.list-mode { display:block; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .empty-state { grid-column:1/-1; text-align:center; padding:5rem 2rem; animation:fadeUp .4s ease both; }
  .empty-icon { font-size:3rem; margin-bottom:1.5rem; opacity:.4; }
  .empty-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--muted); margin-bottom:.6rem; }
  .empty-sub { font-family:'Space Mono',monospace; font-size:.67rem; letter-spacing:.1em; color:var(--muted); line-height:1.9; }

  /* DJ card */
  .dj-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.5rem; position:relative; overflow:hidden; transition:transform .25s,border-color .25s,box-shadow .25s; animation:fadeUp .35s ease both; }
  .no-animate .dj-card, .no-animate .dj-list-row { animation:none !important; }
  .dj-card:hover { transform:translateY(-3px); border-color:var(--neon); box-shadow:0 8px 32px rgba(0,245,196,.07),0 0 0 1px rgba(0,245,196,.1); }
  .dj-card.club:hover { border-color:var(--pink); box-shadow:0 8px 32px rgba(255,45,120,.07),0 0 0 1px rgba(255,45,120,.1); }
  .card-glow { position:absolute; top:0; right:0; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,rgba(0,245,196,.06) 0%,transparent 70%); pointer-events:none; }
  .dj-card.club .card-glow { background:radial-gradient(circle,rgba(255,45,120,.07) 0%,transparent 70%); }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1rem; }
  .avatar { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:1.3rem; flex-shrink:0; position:relative; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; position:absolute; inset:0; z-index:1; }
  .dll-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:.95rem; flex-shrink:0; overflow:hidden; position:relative; }
  .dll-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; position:absolute; inset:0; }
  .avatar::after { content:''; position:absolute; inset:-2px; border-radius:50%; background:conic-gradient(var(--neon),transparent 60%,var(--neon)); z-index:-1; animation:spin 8s linear infinite; }
  .dj-card.club .avatar::after { background:conic-gradient(var(--pink),transparent 60%,var(--pink)); }
  @keyframes spin { to{transform:rotate(360deg)} }
  .type-badge { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; padding:.28rem .65rem; border-radius:100px; background:var(--neon-dim); color:var(--neon); border:1px solid rgba(0,245,196,.2); }
  .dj-card.club .type-badge { background:var(--pink-dim); color:var(--pink); border-color:rgba(255,45,120,.2); }
  .dj-name { font-family:'Bebas Neue',sans-serif; font-size:1.55rem; letter-spacing:.04em; line-height:1; margin-bottom:.22rem; }
  .dj-real { font-size:.78rem; color:var(--muted); font-style:italic; margin-bottom:.18rem; }
  .dj-city { font-size:.76rem; color:var(--muted); margin-bottom:.8rem; }
  .genres { display:flex; flex-wrap:wrap; gap:.3rem; margin-bottom:.9rem; }
  .genre-tag { font-family:'Space Mono',monospace; font-size:.57rem; letter-spacing:.08em; text-transform:uppercase; padding:.2rem .52rem; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:4px; color:var(--muted); }
  .card-meta { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.9rem; padding-top:.9rem; border-top:1px solid var(--border); }
  .meta-label { font-family:'Space Mono',monospace; font-size:.52rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:.18rem; }
  .meta-value { font-size:.8rem; color:var(--white); font-weight:500; }
  .rating-stars { display:flex; gap:2px; margin-top:.1rem; }
  .star { width:10px; height:10px; fill:var(--amber); }
  .star.empty { fill:var(--border); }
  .contact-section { padding:.85rem 0; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:.4rem; }
  .contact-row { display:flex; align-items:center; gap:.5rem; font-size:.76rem; color:var(--muted); overflow:hidden; }
  .contact-row svg { width:12px; height:12px; flex-shrink:0; opacity:.55; }
  .contact-row a { color:var(--muted); text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .18s; }
  .contact-row a:hover { color:var(--neon); }
  .dj-card.club .contact-row a:hover { color:var(--pink); }
  .social-row { display:flex; gap:.4rem; padding-top:.25rem; flex-wrap:wrap; }
  .social-btn { display:inline-flex; align-items:center; gap:.3rem; padding:.27rem .58rem; border-radius:4px; font-family:'Space Mono',monospace; font-size:.56rem; letter-spacing:.07em; text-transform:uppercase; border:1px solid var(--border); color:var(--muted); text-decoration:none; transition:all .18s; }
  .social-btn svg { width:10px; height:10px; }
  .social-btn:hover { border-color:var(--neon); color:var(--neon); background:var(--neon-dim); }
  .dj-card.club .social-btn:hover { border-color:var(--pink); color:var(--pink); background:var(--pink-dim); }
  .card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:.9rem; border-top:1px solid var(--border); }
  .availability { display:flex; align-items:center; gap:.5rem; font-size:.75rem; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 7px var(--success); animation:pulse 2s ease-in-out infinite; }
  .dot.busy { background:var(--amber); box-shadow:0 0 7px var(--amber); }
  .dot.offline { background:var(--muted); box-shadow:none; animation:none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.82)} }
  .rate { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--neon); }
  .dj-card.club .rate { color:var(--pink); }
  footer { border-top:1px solid var(--border); padding:1.8rem 4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
  .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.1em; color:var(--muted); }
  .footer-note { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.13em; color:var(--muted); text-transform:uppercase; }

  /* ═══════════════════════════════
     LOGIN VIEW
  ═══════════════════════════════ */
  #view-login { min-height:100vh; display:none; align-items:center; justify-content:center; }
  #view-login.active { display:flex; }
  .login-box { width:100%; max-width:380px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:2.5rem; text-align:center; animation:fadeUp .35s ease both; }
  .login-icon { font-size:2rem; margin-bottom:1.2rem; opacity:.7; }
  .login-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:.08em; color:var(--admin); margin-bottom:.3rem; }
  .login-sub { font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; margin-bottom:2rem; }
  .login-field input { width:100%; padding:.8rem 1rem; background:var(--deep); border:1px solid var(--border); border-radius:8px; color:var(--white); font-family:'Space Mono',monospace; font-size:.8rem; outline:none; text-align:center; letter-spacing:.15em; transition:border-color .2s; margin-bottom:.75rem; }
  .login-field input:focus { border-color:var(--admin); }
  .login-field input::placeholder { color:var(--muted); letter-spacing:.1em; }
  .login-error { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--error); letter-spacing:.08em; margin-bottom:.8rem; min-height:1rem; }
  .login-btn { width:100%; padding:.85rem; background:var(--admin-dim); border:1px solid var(--admin); border-radius:8px; color:var(--admin); font-family:'Space Mono',monospace; font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:all .2s; margin-bottom:1rem; }
  .login-btn:hover { background:rgba(167,139,250,.25); }
  .back-link { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.1em; color:var(--muted); background:none; border:none; cursor:pointer; text-transform:uppercase; transition:color .2s; }
  .back-link:hover { color:var(--white); }

  /* ═══════════════════════════════
     ADMIN VIEW
  ═══════════════════════════════ */
  #view-admin { display:none; }
  #view-admin.active { display:block; }
  .admin-header { background:var(--deep); border-bottom:1px solid var(--border); padding:1.5rem 4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; position:relative; }
  .admin-header::before { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--admin),transparent); }
  .admin-branding { display:flex; align-items:center; gap:1rem; }
  .admin-wordmark { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.1em; color:var(--admin); }
  .admin-badge { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.2em; text-transform:uppercase; padding:.3rem .7rem; border-radius:100px; background:var(--admin-dim); border:1px solid rgba(167,139,250,.3); color:var(--admin); }
  .admin-actions { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
  .admin-body { padding:2.5rem 4rem; max-width:1400px; }

  /* stat bar */
  .stat-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1rem; margin-bottom:2.5rem; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.2rem 1.5rem; }
  .stat-number { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; line-height:1; color:var(--admin); }
  .stat-label { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-top:.2rem; }
  .stat-card.mobile .stat-number { color:var(--neon); }
  .stat-card.club .stat-number { color:var(--pink); }

  /* tabs */
  .admin-tabs { display:flex; gap:.5rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:0; }
  .tab-btn { font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; padding:.7rem 1.4rem; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; transition:all .2s; margin-bottom:-1px; }
  .tab-btn:hover { color:var(--white); }
  .tab-btn.active { color:var(--admin); border-bottom-color:var(--admin); }
  .tab-content { display:none; }
  .tab-content.active { display:block; animation:fadeUp .25s ease both; }

  /* section */
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:.08em; color:var(--admin); margin-bottom:1.2rem; display:flex; align-items:center; gap:.65rem; }
  .section-title svg { width:15px; height:15px; opacity:.7; }

  /* ── MANUAL FORM ── */
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:2rem; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .form-grid.three { grid-template-columns:1fr 1fr 1fr; }
  .form-group { display:flex; flex-direction:column; gap:.4rem; }
  .form-group.full { grid-column:1/-1; }
  .form-label { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .form-label .opt { color:var(--muted); opacity:.5; margin-left:.3rem; font-size:.55rem; }
  .form-input, .form-select { width:100%; padding:.7rem .9rem; background:var(--deep); border:1px solid var(--border); border-radius:6px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; transition:border-color .2s,box-shadow .2s; }
  .form-input:focus, .form-select:focus { border-color:var(--admin); box-shadow:0 0 0 3px var(--admin-dim); }
  .form-input::placeholder { color:var(--muted); font-size:.82rem; }
  .form-select { cursor:pointer; appearance:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%236b6b88' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right .75rem center; background-size:14px; padding-right:2.2rem; }
  .form-select option { background:var(--card); }
  .form-hint { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.05em; color:var(--muted); margin-top:.25rem; line-height:1.6; }

  /* star rating picker */
  .star-picker { display:flex; gap:.3rem; align-items:center; }
  .star-pick { font-size:1.3rem; cursor:pointer; filter:grayscale(1) opacity(.4); transition:filter .15s,transform .15s; line-height:1; }
  .star-pick:hover, .star-pick.on { filter:none; transform:scale(1.15); }

  /* type toggle */
  .type-toggle { display:flex; gap:.5rem; }

async function loadDJs(){ 
  const { data, error } = await db
    .from('users')
    .select('*')
    .eq('role', 'dj')
    .eq('confirmed', true)
    .order('name');
  
  if (error) {
    console.error('Error loading DJs:', error);
    return [];
  }
  
  // Transform Supabase data to match our format
  return data.map(dj => ({
    id: dj.id,
    slug: dj.slug,
    name: dj.name,
    type: dj.type,
    country: dj.country,
    state: dj.state,
    city: dj.city,
    zip: dj.zip,
    rate: dj.rate,
    rating: dj.rating || 0,
    avail: dj.avail || 'available',

    email: dj.email,

  }));

// ─── HELPERS ──────────────────────────────────────────
function djSlug(dj){
  if(dj.slug) return dj.slug;
  return (dj.name||'').toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'') || dj.id;
}
function djProfileURL(slug) {
  const isLocal = window.location.hostname === 'localhost' || window.location.protocol === 'file:';
  return isLocal ? 'dj-profile.html?dj='+slug : '/'+slug;
}

// Haversine distance formula
function calcDistance(lat1,lon1,lat2,lon2){
  const R=3959; // miles
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Country code map for geocoding bias
const COUNTRY_CODES = {'United States':'us','United Kingdom':'gb','Canada':'ca','Australia':'au','Germany':'de','France':'fr','Netherlands':'nl','Spain':'es','Italy':'it','Brazil':'br','Mexico':'mx','Japan':'jp','South Africa':'za','New Zealand':'nz','Ireland':'ie','Sweden':'se','Norway':'no','Denmark':'dk','Belgium':'be','Switzerland':'ch','Portugal':'pt'};

// Geocode city name or zip to lat/lng
async function geocodeCity(query, countryCode){
  if(!query)return null;
  try{
    const isZip = /^\d{4,10}$/.test(query.trim());
    const cc = countryCode || COUNTRY_CODES[activeCountry] || '';
    const url = isZip
      ? `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(query)}${cc?'&countrycodes='+cc:''}&format=json&limit=1`
      : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}${cc?'&countrycodes='+cc:''}&format=json&limit=1`;
    const res=await fetch(url);
    const data=await res.json();
    if(data&&data[0])return{lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
  }catch(e){console.error('Geocode error:',e);}
  return null;
}

function findNearMe(){
  const btn=document.getElementById('near-me-btn');

}

async function renderPublic(reload=false){
  if(reload || !DJS.length) DJS = await loadDJs();
  let list=DJS.filter(dj=>{
    const t = activeFilters.size === 0 || activeFilters.has(dj.type) || (activeFilters.size === 2);
    const q=searchTerm.toLowerCase();
    const looksLikeLocation = /\d/.test(q);
    const s=!q||looksLikeLocation||[dj.name,dj.zip].some(v=>(v||'').toLowerCase().includes(q));
    // Filter by country
    const countryMatch = !dj.country || dj.country === activeCountry;
    return t&&s&&countryMatch;
  });

  // Geocode + distance filter whenever we have a user location
  if(userLocation){
    const promises=list.map(async dj=>{
      if(!dj._coords){
        const geoTarget = dj.zip || dj.city;
        const djCC = COUNTRY_CODES[dj.country] || '';
        if (geoTarget) {
          const coords = await geocodeCity(geoTarget, djCC);
          if (coords) dj._coords = coords; // only cache on success
        }
      }
      if(dj._coords){
        dj._distance=calcDistance(userLocation.lat,userLocation.lng,dj._coords.lat,dj._coords.lng);
      } else {
        dj._distance=9999;
      }
      return dj;
    });
    await Promise.all(promises);

    // Filter out DJs who don't travel far enough to reach the user
    // Only apply when searching by zip (looksLikeLocation)
    const searchedByZip = /\d/.test(searchTerm.trim());
    if (searchedByZip) {
      list=list.filter(dj=>{
        if(!dj.travel_distance) return true; // no limit set — show them
        if(dj.travel_distance==='worldwide') return true;
        const maxMiles=parseInt(dj.travel_distance);
        if(isNaN(maxMiles)) return true;
        return (dj._distance||0) <= maxMiles + 10; // 10 mile extension
      });
    }
  }

  // Sort
  if(sortMode==='nearest'&&userLocation){
    // Distances already calculated above, just sort
    list.sort((a,b)=>(a._distance||9999)-(b._distance||9999));
  } else if(sortMode==='name'){
    list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  } else if(sortMode==='location'){
    list.sort((a,b)=>(a.city||'zzz').localeCompare(b.city||'zzz'));
  } else if(sortMode==='rating'){
    list.sort((a,b)=>(b.rating||0)-(a.rating||0));
  } else if(sortMode==='availability'){
    const order={available:0,busy:1,offline:2};
    list.sort((a,b)=>(order[a.avail]??1)-(order[b.avail]??1));
  }

  document.getElementById('showing-count').textContent=list.length;
  const grid=document.getElementById('dj-grid');
  if(!DJS.length){ grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🎧</div><div class="empty-title">No DJs Listed Yet</div><div class="empty-sub">Check back soon.</div></div>`; return; }
  if(!list.length){ grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No Results</div><div class="empty-sub">Try different keywords or adjust the filters.</div></div>`; return; }

  if(viewMode === 'list') {
    grid.innerHTML = `<div class="dj-list">${list.map(dj => listRowHTML(dj)).join('')}</div>`;
    return;
  }

  // Grid view
  let html='';
  let lastCity='';
  list.forEach((dj,i)=>{
    if(sortMode==='location'){
      const cityKey=(dj.city||'No Location Set').split(',')[0].trim();
      if(cityKey!==lastCity){
        html+=`<div class="location-group-header">${dj.city||'No Location Set'}</div>`;
        lastCity=cityKey;
      }
    }
    html+=cardHTML(dj,i);
  });
  grid.innerHTML=html;
}

  <div class="dj-card ${typeClass}" style="animation-delay:${i*.03}s;cursor:pointer;" onclick="window.location.href=djProfileURL('${slug}')">
    <div class="card-glow"></div>

}

function listRowHTML(dj) {

  // Check if booking is enabled for this DJ

  try {
    if (dj.booking_settings) {
      const bs = typeof dj.booking_settings === 'string' ? JSON.parse(dj.booking_settings) : dj.booking_settings;
      bookingEnabled = !!(bs && bs.booking_enabled);
    }
  } catch(e) {}

  const bookBtn = bookingEnabled
    ? `<button class="dll-contact-btn" onclick="event.stopPropagation();${!currentUser ? 'showSignupPrompt()' : `window.location.href='/book.html?dj=${slug}'`}" style="font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .5rem;border-radius:3px;border:none;background:var(--neon);color:var(--black);font-weight:700;cursor:pointer;white-space:nowrap;">Book</button>`

  } else if (isClaimed) {
    contactBtn = `<button class="dll-contact-btn" onclick="event.stopPropagation();window.location.href=djProfileURL('${slug}')" style="font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .5rem;border-radius:3px;border:1px solid var(--neon);color:var(--neon);background:transparent;cursor:pointer;white-space:nowrap;">Contact</button>`;
  } else if (dj.email) {
    contactBtn = `<button class="dll-contact-btn" onclick="event.stopPropagation();window.open('mailto:${dj.email}','_blank')" style="font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .5rem;border-radius:3px;border:1px solid var(--neon);color:var(--neon);background:transparent;cursor:pointer;white-space:nowrap;">Contact</button>`;
  } else {
    contactBtn = `<button class="dll-contact-btn" onclick="event.stopPropagation();window.location.href=djProfileURL('${slug}')" style="font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .5rem;border-radius:3px;border:1px solid var(--neon);color:var(--neon);background:transparent;cursor:pointer;white-space:nowrap;">Contact</button>`;
  }

  return `
  <div class="dj-list-row ${dj.type||''}" style="cursor:pointer;" onclick="window.location.href=djProfileURL('${slug}')">
    <div class="dll-avatar" style="${avatarStyle(dj.type)}">${dj.avatar_url ? `<img src="${dj.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;">` : initials(dj.name)}</div>
    <div class="dll-name-wrap">
      <div class="dll-name">${dj.name||'Unknown DJ'}</div>

    </div>
    <span class="dll-type ${typeClass}">${typeLabel}</span>
    <div style="display:flex;gap:.3rem;align-items:center;">${bookBtn}${contactBtn}</div>
  </div>`;
}

let searchGeoTimeout = null;
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  // If search looks like a city or zip, geocode it to enable distance filtering
  clearTimeout(searchGeoTimeout);
  const q = searchTerm.trim();
  if (q.length >= 3) {
    searchGeoTimeout = setTimeout(async () => {
      // Only geocode if query looks like a location (has digits or is a known place pattern)
      // Skip geocoding for name searches (letters/spaces only)
      const looksLikeLocation = /\d/.test(q);
      if (looksLikeLocation) {
        const coords = await geocodeCity(q);
        if (coords) {
          userLocation = coords;
          sortMode = 'nearest';
          document.getElementById('sort-select').value = 'nearest';
        }
      } else {
        // Name search — clear location so distance doesn't filter results
        userLocation = null;
        if (sortMode === 'nearest') sortMode = 'name';
      }
      renderPublic();
    }, 600);
  } else {
    renderPublic();
  }
});
document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    const f=pill.dataset.filter;
    if(activeFilters.has(f)){
      if(activeFilters.size > 1){ activeFilters.delete(f); pill.classList.remove('active'); updatePillText(pill, false); }
    } else {
      activeFilters.add(f); pill.classList.add('active'); updatePillText(pill, true);
    }
    renderPublic();
  });
});

function updatePillText(pill, active) {
  const base = pill.dataset.label || pill.textContent.replace('✓ ', '');
  if (!pill.dataset.label) pill.dataset.label = base;
  pill.textContent = active ? base + ' ✓' : base;
}

  const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser') || 'null');
  
  if (currentUser) {
    document.getElementById('signin-btn').style.display = 'none';
    document.getElementById('signup-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'inline-flex';
    document.getElementById('inbox-btn').style.display = 'inline-flex';
    document.getElementById('settings-btn').style.display = 'inline-flex';

    if (currentUser.role === 'dj') {
      // DJs get Edit Profile + View My Profile, no settings icon
      document.getElementById('profile-btn').style.display = 'inline-flex';
      document.getElementById('settings-btn').style.display = 'none';
      if (currentUser.slug) {
        document.getElementById('view-profile-btn').href = '/' + currentUser.slug;
        document.getElementById('view-profile-btn').style.display = 'inline-flex';
      }
    }
    // Hosts and venues get settings icon only, no profile buttons

    // Load unread count + poll every 30s
    async function refreshInboxBadge() {
      try {
        const { data: top } = await db.from('messages').select('id').eq('to_user_id', currentUser.id).neq('from_user_id', currentUser.id).eq('read', false).is('parent_id', null);
        const { data: reps } = await db.from('messages').select('id').eq('to_user_id', currentUser.id).neq('from_user_id', currentUser.id).eq('read', false).not('parent_id', 'is', null);
        const count = ((top || []).length) + ((reps || []).length);
        const badge = document.getElementById('inbox-badge');
        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      } catch(e) {}
    }
    refreshInboxBadge();
    setInterval(refreshInboxBadge, 30000);
  }
})();

</script>
