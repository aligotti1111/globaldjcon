<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venue Profile - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
function openMobileMenu(){document.getElementById('mobile-menu').classList.add('open');}
function closeMobileMenu(){document.getElementById('mobile-menu').classList.remove('open');}
function gdcSetupMobileMenu(){
  var cu=null;
  try{cu=JSON.parse(sessionStorage.getItem('currentUser')||localStorage.getItem('currentUser')||'null');}catch(e){}
  if(!cu){
    var lo=document.getElementById('mobile-menu-loggedout');if(lo)lo.style.display='block';
    return;
  }
  var li=document.getElementById('mobile-menu-loggedin');if(li)li.style.display='block';
  if(cu.role==='dj'){
    var d=document.getElementById('mobile-menu-dj');if(d)d.style.display='block';
    var mv=document.getElementById('mob-view-profile');if(mv&&cu.slug)mv.href='/'+cu.slug;
  }else{
    var v=document.getElementById('mobile-menu-venue');if(v)v.style.display='block';
  }
}
document.addEventListener('DOMContentLoaded',gdcSetupMobileMenu);
</script>
<style>
:root {
  --black: #050507;
  --deep: #0a0a10;
  --card: #13131e;
  --border: #1e1e30;
  --neon: #00f5c4;
  --neon-dim: rgba(0,245,196,0.12);
  --pink: #f5e642;
  --white: #f0f0f8;
  --muted: #6b6b88;
  --admin: #a78bfa;
  --admin-dim: rgba(167,139,250,0.12);
  --success: #3ddc84;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.3; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); }

header { position:relative; z-index:10; border-bottom:1px solid var(--border); background:rgba(5,5,7,.85); backdrop-filter:blur(12px); }
.header-inner { display:flex; align-items:center; justify-content:space-between; padding:1rem 4rem; }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.1em; background:linear-gradient(135deg,var(--white) 30%,var(--neon) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
.nav-btns { display:flex; gap:.6rem; align-items:center; }
.btn { display:inline-flex; align-items:center; gap:.45rem; font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; padding:.6rem 1rem; border-radius:6px; border:1px solid; cursor:pointer; text-decoration:none; transition:all .2s; white-space:nowrap; }
.btn-outline { background:transparent; border-color:var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--neon); color:var(--neon); }
.btn-primary { background:var(--neon); border-color:var(--neon); color:var(--black); font-weight:700; }
.btn-primary:hover { opacity:.85; }

/* STATUS */
.status-wrap { position:relative; z-index:2; display:flex; align-items:center; justify-content:center; min-height:60vh; }
.status-box { text-align:center; padding:2rem; }
.status-box h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--muted); margin-bottom:.5rem; }
.status-box p { color:var(--muted); font-size:.85rem; }

/* HERO */
.hero { position:relative; z-index:2; padding:3rem 4rem 2rem; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:2.5rem; }
.venue-avatar { width:120px; height:120px; border-radius:12px; background:var(--admin-dim); border:2px solid rgba(167,139,250,.3); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--admin); flex-shrink:0; overflow:hidden; }
.venue-avatar img { width:100%; height:100%; object-fit:cover; }
.hero-info { flex:1; min-width:0; }
.venue-name { font-family:'Bebas Neue',sans-serif; font-size:3.2rem; letter-spacing:.03em; line-height:1; margin-bottom:.5rem; }
.venue-badge { display:inline-flex; align-items:center; gap:.4rem; font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; padding:.25rem .7rem; border-radius:100px; background:var(--admin-dim); color:var(--admin); border:1px solid rgba(167,139,250,.3); margin-bottom:.75rem; }
.venue-location { display:flex; align-items:center; gap:.4rem; color:var(--muted); font-size:.85rem; margin-bottom:.75rem; }
.hero-actions { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:1rem; }
.action-btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem .9rem; border-radius:8px; font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.08em; text-transform:uppercase; font-weight:700; cursor:pointer; text-decoration:none; transition:all .2s; border:1px solid; min-width:46px; min-height:46px; }
.action-btn.primary { background:var(--neon-dim); border-color:rgba(0,245,196,.4); color:var(--neon); }
.action-btn.primary:hover { background:rgba(0,245,196,.22); }
.action-btn.ghost { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.12); color:var(--white); }
.action-btn.ghost:hover { background:rgba(255,255,255,.08); }
.action-btn.admin-btn { background:var(--admin-dim); border-color:rgba(167,139,250,.4); color:var(--admin); }

/* BODY */
.body { position:relative; z-index:2; padding:2.5rem 4rem 4rem; max-width:900px; }
.info-section { margin-bottom:2.5rem; }
.section-title { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; padding-bottom:.5rem; border-bottom:1px solid var(--border); }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
.info-item label { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:.25rem; }
.info-item span { font-size:.9rem; color:var(--white); }

/* Contact card */
.contact-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.5rem; }

/* Mobile */
@media(max-width:900px) {
  .header-inner { padding:1rem 1.2rem; flex-wrap:wrap; gap:.6rem; }
  .nav-btns { flex-wrap:wrap; gap:.4rem; width:100%; }
  .btn { font-size:.55rem; padding:.45rem .6rem; }
  .hero { padding:1.5rem; flex-direction:column; gap:1rem; }
  .venue-avatar { width:80px; height:80px; font-size:2rem; }
  .venue-name { font-size:2rem; }
  .body { padding:1.5rem; }
  .info-grid { grid-template-columns:1fr; }
}

.hamburger-btn{display:none;position:absolute;left:1rem;top:50%;transform:translateY(-50%);background:transparent;border:1px solid var(--border,#1e1e30);border-radius:6px;color:var(--white,#f0f0f8);cursor:pointer;padding:.4rem .5rem;z-index:20;line-height:1;}
.mobile-menu{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);}
.mobile-menu.open{display:flex;flex-direction:column;}
.mobile-menu-panel{background:var(--card,#13131e);border-right:1px solid var(--border,#1e1e30);width:75%;max-width:280px;height:100%;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto;}
.mobile-menu-close{align-self:flex-end;background:transparent;border:none;color:var(--muted,#6b6b88);font-size:1.4rem;cursor:pointer;margin-bottom:1rem;padding:.25rem;}
.mobile-menu-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--white,#f0f0f8);text-decoration:none;border:none;background:transparent;cursor:pointer;transition:background .2s;width:100%;text-align:left;}
.mobile-menu-item:hover{background:rgba(255,255,255,.06);}
.mobile-menu-item.primary{color:var(--neon,#00f5c4);}
.mobile-menu-item.danger{color:#ff5f5f;}
.mobile-menu-divider{border:none;border-top:1px solid var(--border,#1e1e30);margin:.25rem 0;}
@media(max-width:600px){
  .hamburger-btn{display:flex !important;align-items:center;justify-content:center;position:static !important;transform:none !important;}
  .header-inner{display:grid !important;grid-template-columns:44px 1fr 44px !important;align-items:center !important;padding:.75rem 1rem !important;flex-wrap:nowrap !important;justify-content:unset !important;}
  .nav-logo{text-align:center !important;font-size:1.5rem !important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-btns{position:static !important;display:flex !important;gap:.3rem;align-items:center;flex-wrap:nowrap;justify-content:flex-end;}
  .nav-btns .btn,.nav-btns .btn-outline,.nav-btns .btn-primary{display:none !important;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="hamburger-btn" onclick="openMobileMenu()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a href="/" class="nav-logo">Global DJ Connect</a>
    <div class="nav-btns" id="nav-btns"></div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu" onclick="if(event.target===this)closeMobileMenu()">
  <div class="mobile-menu-panel">
    <button class="mobile-menu-close" onclick="closeMobileMenu()">&#x2715;</button>
    <a href="/" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2h-4a2 2 0 01-2-2v-4a2 2 0 00-2-2h-0a2 2 0 00-2 2v4a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Home</a>
    <hr class="mobile-menu-divider">
    <div id="mobile-menu-dj" style="display:none;">
      <a href="#" id="mob-view-profile" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>View My Profile</a>
      <a href="/update-dj-profile.html" class="mobile-menu-item primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536M9 13l-4 4 4-4zm6.364-6.364A2 2 0 0118.2 9.4L8 19.6H4v-4L14.2 5.4a2 2 0 012.164-.532z"/></svg>Edit My Profile</a>
    </div>
    <div id="mobile-menu-venue" style="display:none;">
      <a href="/booking-requests.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Booking Requests</a>
      <a href="/account-settings.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
    </div>
    <div id="mobile-menu-loggedin" style="display:none;">
      <hr class="mobile-menu-divider">
      <button class="mobile-menu-item danger" onclick="navLogout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Log Out</button>
    </div>
    <div id="mobile-menu-loggedout" style="display:none;">
      <a href="/login.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>Sign In</a>
      <a href="/signup.html" class="mobile-menu-item primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Create Account</a>
    </div>
    <hr class="mobile-menu-divider">
    <a href="/contact.html" class="mobile-menu-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Contact Us</a>
  </div>
</div>

<div id="loading-view" class="status-wrap">
  <div class="status-box"><h2>Loading...</h2><p>Fetching venue profile</p></div>
</div>

<div id="error-view" class="status-wrap" style="display:none;">
  <div class="status-box">
    <h2>Venue Not Found</h2>
    <p>This venue profile doesn't exist.</p>
    <a href="/" style="display:inline-block;margin-top:1.5rem;" class="btn btn-outline">← Back to Directory</a>
  </div>
</div>

<div id="profile-content" style="display:none;">
  <div class="hero">
    <div class="venue-avatar" id="p-avatar"></div>
    <div class="hero-info">
      <div class="venue-name" id="p-name"></div>
      <div class="venue-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Venue
      </div>
      <div class="venue-location" id="p-location" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="p-location-text"></span>
      </div>
      <div class="hero-actions" id="hero-actions">
        <button onclick="copyShareUrl()" class="action-btn ghost" title="Copy Link" id="copy-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="18" height="18" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="info-section" id="address-section" style="display:none;">
      <div class="section-title">Location</div>
      <div class="contact-card">
        <div style="display:flex;align-items:flex-start;gap:.75rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--admin)" stroke-width="2" style="flex-shrink:0;margin-top:2px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div>
            <div id="p-address" style="font-size:.9rem;color:var(--white);line-height:1.6;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="info-section" id="contact-section" style="display:none;">
      <div class="section-title">Contact</div>
      <div class="contact-card" id="p-contact"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hwqvzuusquruhwguqole.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cXZ6dXVzcXVydWh3Z3Vxb2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjkxNjUsImV4cCI6MjA4NzE0NTE2NX0.TKoNk-u5bEKgVy-pXRrCYv8Iui8SzIa5ExiVUyEJ6UE';
const db = window.db || window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function initials(name) {
  return (name||'V').split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
}

function copyShareUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => { btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="18" height="18" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'; }, 2000);
  });
}

function navLogout() {
  localStorage.removeItem('currentUser');
  sessionStorage.removeItem('currentUser');
  window.location.href = '/';
}

// Nav handled by GDJAuth.renderNav() in auth.js
const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser') || 'null');

// Load venue from slug
(async () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('v') || window.location.pathname.replace(/^\/+|\/+$/g, '');
  if (!slug) { document.getElementById('loading-view').style.display = 'none'; document.getElementById('error-view').style.display = 'flex'; return; }

  const { data, error } = await db.from('users').select('*').eq('slug', slug).eq('role', 'venue').single();

  document.getElementById('loading-view').style.display = 'none';

  if (error || !data) {
    document.getElementById('error-view').style.display = 'flex';
    return;
  }

  // Set page title
  document.title = `${data.venue_name || data.name} - Global DJ Connect`;

  // Avatar
  const avatar = document.getElementById('p-avatar');
  avatar.textContent = initials(data.venue_name || data.name);

  // Name
  document.getElementById('p-name').textContent = data.venue_name || data.name || 'Venue';

  // Location (short: city, state)
  const shortLoc = [data.city, data.state].filter(Boolean).join(', ');
  if (shortLoc) {
    document.getElementById('p-location-text').textContent = shortLoc;
    document.getElementById('p-location').style.display = 'flex';
  }

  // Full address block
  const addrParts = [data.address, data.city, data.state, data.zip, data.country].filter(Boolean);
  if (addrParts.length) {
    document.getElementById('p-address').innerHTML = addrParts.join('<br>');
    document.getElementById('address-section').style.display = 'block';
  }

  // Contact info
  const contactItems = [];
  if (data.email) contactItems.push(`<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;font-size:.85rem;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:${data.email}" style="color:var(--neon);text-decoration:none;">${data.email}</a></div>`);
  if (data.phone) contactItems.push(`<div style="display:flex;align-items:center;gap:.6rem;font-size:.85rem;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.03 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/></svg><span style="color:var(--white);">${data.phone}</span></div>`);
  if (contactItems.length) {
    document.getElementById('p-contact').innerHTML = contactItems.join('');
    document.getElementById('contact-section').style.display = 'block';
  }

  // Show edit button if it's the current user's profile
  if (currentUser && currentUser.id === data.id) {
    document.getElementById('nav-settings').style.display = 'inline-flex';
  }

  document.getElementById('profile-content').style.display = 'block';
})();
</script>
</body>
</html>
