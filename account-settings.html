<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
function openMobileMenu(){{document.getElementById('mobile-menu').classList.add('open');}}
function closeMobileMenu(){{document.getElementById('mobile-menu').classList.remove('open');}}
function gdcSetupMobileMenu(){{
  var cu=null;
  try{{cu=JSON.parse(sessionStorage.getItem('currentUser')||localStorage.getItem('currentUser')||'null');}}catch(e){{}}
  if(!cu){{
    var lo=document.getElementById('mobile-menu-loggedout');if(lo)lo.style.display='block';
    return;
  }}
  var li=document.getElementById('mobile-menu-loggedin');if(li)li.style.display='block';
  if(cu.role==='dj'){{
    var d=document.getElementById('mobile-menu-dj');if(d)d.style.display='block';
    var mv=document.getElementById('mob-view-profile');if(mv&&cu.slug)mv.href='/'+cu.slug;
  }}else{{
    var v=document.getElementById('mobile-menu-venue');if(v)v.style.display='block';
  }}
}}
document.addEventListener('DOMContentLoaded',gdcSetupMobileMenu);

</script>
<style>
:root {
  --black: #050507;
  --deep: #0a0a10;
  --card: #13131e;
  --border: #1e1e30;
  --neon: #00f5c4;
  --neon-dim: rgba(0,245,196,0.12);
  --white: #f0f0f8;
  --muted: #6b6b88;
  --error: #ff5f5f;
  --success: #3ddc84;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }
header { border-bottom:1px solid var(--border); background:rgba(5,5,7,.9); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
.header-inner { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.1em; background:linear-gradient(135deg,var(--white) 30%,var(--neon) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
.nav-btns { display:flex; gap:.6rem; align-items:center; }
.btn { display:inline-flex; align-items:center; gap:.45rem; font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; padding:.6rem 1rem; border-radius:6px; border:1px solid; cursor:pointer; text-decoration:none; transition:all .2s; background:transparent; }
.btn-outline { border-color:var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--neon); color:var(--neon); }

.page-wrap { max-width:560px; margin:0 auto; padding:3rem 2rem; }
.page-header { margin-bottom:2.5rem; }
.page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:.03em; background:linear-gradient(135deg,var(--white),var(--neon)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.page-header p { color:var(--muted); font-size:.85rem; margin-top:.3rem; }

.settings-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:2rem; margin-bottom:1.5rem; }
.settings-card h2 { font-family:'Space Mono',monospace; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:var(--neon); margin-bottom:1.5rem; }

.form-group { margin-bottom:1.25rem; }
.form-group label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:.4rem; font-family:'Space Mono',monospace; letter-spacing:.06em; text-transform:uppercase; }
.form-group input, .form-group select { width:100%; background:var(--deep); border:1px solid var(--border); border-radius:6px; padding:.75rem 1rem; color:var(--white); font-size:.92rem; font-family:'DM Sans',sans-serif; transition:border-color .2s; }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--neon); }
.form-group input::placeholder { color:var(--muted); }

.save-btn { width:100%; padding:.9rem; background:var(--neon-dim); border:1px solid var(--neon); color:var(--neon); border-radius:6px; font-family:'Space Mono',monospace; font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .2s; margin-top:.5rem; }
.save-btn:hover { background:rgba(0,245,196,.22); }
.save-btn:disabled { opacity:.5; cursor:not-allowed; }

.alert { padding:.85rem 1rem; border-radius:6px; font-size:.85rem; margin-bottom:1.25rem; border:1px solid; }
.alert-success { background:rgba(61,220,132,.08); border-color:rgba(61,220,132,.3); color:#3ddc84; }
.alert-error { background:rgba(255,95,95,.08); border-color:rgba(255,95,95,.3); color:var(--error); }

.hint { font-size:.75rem; color:var(--muted); margin-top:.3rem; }
.addr-suggestions { position:absolute; top:0; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:6px; z-index:50; overflow:hidden; }
.addr-suggestion { padding:.65rem 1rem; font-size:.85rem; cursor:pointer; color:var(--white); transition:background .15s; }
.addr-suggestion:hover { background:var(--neon-dim); color:var(--neon); }

.hamburger-btn{display:none;position:absolute;left:1rem;top:50%;transform:translateY(-50%);background:transparent;border:1px solid var(--border,#1e1e30);border-radius:6px;color:var(--white,#f0f0f8);cursor:pointer;padding:.4rem .5rem;z-index:20;line-height:1;}
.mobile-menu{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);}
.mobile-menu.open{display:flex;flex-direction:column;}
.mobile-menu-panel{background:var(--card,#13131e);border-right:1px solid var(--border,#1e1e30);width:75%;max-width:280px;height:100%;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto;}
.mobile-menu-close{align-self:flex-end;background:transparent;border:none;color:var(--muted,#6b6b88);font-size:1.4rem;cursor:pointer;margin-bottom:1rem;padding:.25rem;}
.mobile-menu-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--white,#f0f0f8);text-decoration:none;border:none;background:transparent;cursor:pointer;transition:background .2s;width:100%;text-align:left;}
.mobile-menu-item:hover{background:rgba(255,255,255,.06);}
.mobile-menu-item.primary{color:var(--neon,#00f5c4);}
.mobile-menu-item.danger{color:#ff5f5f;}
.mobile-menu-divider{border:none;border-top:1px solid var(--border,#1e1e30);margin:.25rem 0;}
@media(max-width:600px){
  .hamburger-btn{display:flex !important;align-items:center;justify-content:center;}
  .header-inner{justify-content:center !important;position:relative !important;padding:.75rem 1rem !important;flex-wrap:nowrap !important;}
  .nav-btns{position:absolute !important;right:1rem;display:flex !important;gap:.3rem;align-items:center;flex-wrap:nowrap;}
  .nav-btns .btn,.nav-btns .btn-outline,.nav-btns .btn-primary{display:none !important;}
}
</style>
</head>

<script>
const SUPABASE_URL = 'https://hwqvzuusquruhwguqole.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cXZ6dXVzcXVydWh3Z3Vxb2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjkxNjUsImV4cCI6MjA4NzE0NTE2NX0.TKoNk-u5bEKgVy-pXRrCYv8Iui8SzIa5ExiVUyEJ6UE';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser') || 'null');
if (!currentUser) { window.location.href = '/login.html'; }

// Pre-fill fields
document.getElementById('setting-name').value = currentUser.name || '';
document.getElementById('setting-email').value = currentUser.email || '';
document.getElementById('setting-country').value = currentUser.country || '';
document.getElementById('account-subtitle').textContent = 
  `${currentUser.role === 'host' ? 'Party Host' : currentUser.role === 'venue' ? 'Venue' : 'DJ'} Account`;

// Venue-specific sections
if (currentUser.role === 'venue') {
  document.getElementById('venue-name-card').style.display = '';
  // Hide generic profile card for venues — name/country are in venue card
  document.querySelector('.settings-card:not([id])') && (() => {
    const cards = document.querySelectorAll('.settings-card');
    cards.forEach(c => { if (c.querySelector('#setting-name') && !c.id) c.style.display = 'none'; });
  })();
  // Load venue data from DB
  (async () => {
    const { data } = await db.from('users').select('venue_name,slug,address,city,state,zip,country,name').eq('id', currentUser.id).single();
    if (data) {
      document.getElementById('setting-venue-name').value = data.venue_name || '';
      document.getElementById('setting-name').value = data.name || '';
      document.getElementById('setting-venue-slug').value = data.slug || '';
      document.getElementById('setting-address').value = data.address || '';
      document.getElementById('setting-city').value = data.city || '';
      document.getElementById('setting-state').value = data.state || '';
      document.getElementById('setting-zip').value = data.zip || '';
      document.getElementById('setting-country-venue').value = data.country || '';
    }
  })();
}

function showAlert(elId, type, msg) {
  const el = document.getElementById(elId);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 4000);
}

function updateStoredUser(updates) {
  const updated = { ...currentUser, ...updates };
  if (sessionStorage.getItem('currentUser')) sessionStorage.setItem('currentUser', JSON.stringify(updated));
  if (localStorage.getItem('currentUser')) localStorage.setItem('currentUser', JSON.stringify(updated));
}

async function saveProfile() {
  const btn = document.getElementById('save-profile-btn');
  const name = document.getElementById('setting-name').value.trim();
  const country = document.getElementById('setting-country').value;
  if (!name || !country) { showAlert('alert-profile', 'error', 'Please fill in all fields.'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const { error } = await db.from('users').update({ name, country }).eq('id', currentUser.id);
    if (error) throw error;
    updateStoredUser({ name, country });
    showAlert('alert-profile', 'success', '✓ Profile updated.');
  } catch(e) {
    showAlert('alert-profile', 'error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

async function saveEmail() {
  const btn = document.getElementById('save-email-btn');
  const newEmail = document.getElementById('setting-email').value.trim().toLowerCase();
  const confirmPw = document.getElementById('confirm-password-email').value;
  if (!newEmail || !confirmPw) { showAlert('alert-email', 'error', 'Please fill in all fields.'); return; }
  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    // Verify current password
    const { data: user } = await db.from('users').select('password').eq('id', currentUser.id).single();
    if (!user || user.password !== confirmPw) throw new Error('Current password is incorrect.');
    // Check email not taken
    const { data: existing } = await db.from('users').select('id').eq('email', newEmail).neq('id', currentUser.id).limit(1);
    if (existing && existing.length > 0) throw new Error('That email is already in use.');
    const { error } = await db.from('users').update({ email: newEmail }).eq('id', currentUser.id);
    if (error) throw error;
    updateStoredUser({ email: newEmail });
    showAlert('alert-email', 'success', '✓ Email updated.');
    document.getElementById('confirm-password-email').value = '';
  } catch(e) {
    showAlert('alert-email', 'error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Update Email';
  }
}

async function savePassword() {
  const btn = document.getElementById('save-password-btn');
  const current = document.getElementById('current-password').value;
  const newPw = document.getElementById('new-password').value;
  const confirmPw = document.getElementById('confirm-new-password').value;
  if (!current || !newPw || !confirmPw) { showAlert('alert-password', 'error', 'Please fill in all fields.'); return; }
  if (newPw.length < 8) { showAlert('alert-password', 'error', 'New password must be at least 8 characters.'); return; }
  if (newPw !== confirmPw) { showAlert('alert-password', 'error', 'New passwords do not match.'); return; }
  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    const { data: user } = await db.from('users').select('password').eq('id', currentUser.id).single();
    if (!user || user.password !== current) throw new Error('Current password is incorrect.');
    const { error } = await db.from('users').update({ password: newPw }).eq('id', currentUser.id);
    if (error) throw error;
    showAlert('alert-password', 'success', '✓ Password updated.');
    document.getElementById('current-password').value = '';
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-new-password').value = '';
  } catch(e) {
    showAlert('alert-password', 'error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Update Password';
  }
}

// ── SAVE ALL VENUE FIELDS ─────────────────────────────────
async function saveVenueAll() {
  const btn = document.getElementById('save-venue-name-btn');
  const venueName = document.getElementById('setting-venue-name').value.trim();
  const slug = makeVenueSlug(document.getElementById('setting-venue-slug').value);
  const address = document.getElementById('setting-address').value.trim();
  const city = document.getElementById('setting-city').value.trim();
  const state = document.getElementById('setting-state').value.trim();
  const zip = document.getElementById('setting-zip').value.trim();
  if (!venueName) { showAlert('alert-venue-name', 'error', 'Venue name is required.'); return; }
  if (!slug) { showAlert('alert-venue-slug', 'error', 'Profile URL is required.'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    // Check slug availability (skip if unchanged)
    if (slug !== (currentUser.slug || '')) {
      const { data: ex } = await db.from('users').select('id').eq('slug', slug).neq('id', currentUser.id).limit(1);
      if (ex && ex.length > 0) throw new Error('That profile URL is already taken.');
    }
    const ownerName = document.getElementById('setting-name').value.trim();
    const country = document.getElementById('setting-country-venue').value;
    const { error } = await db.from('users').update({ venue_name: venueName, name: ownerName || venueName, slug, address, city, state, zip, country }).eq('id', currentUser.id);
    if (error) throw error;
    updateStoredUser({ venue_name: venueName, name: ownerName || venueName, slug, address, city, state, zip, country });
    showAlert('alert-venue-name', 'success', '✓ Venue profile saved.');
  } catch(e) { showAlert('alert-venue-name', 'error', e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save Venue Profile'; }
}

// ── VENUE SLUG ─────────────────────────────────────────────
let venueSlugTimeout = null;
let venueSlugAvailable = false;
function makeVenueSlug(str) {
  return (str||'').toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}
async function checkVenueSlug(val) {
  const slug = makeVenueSlug(val);
  const statusEl = document.getElementById('venue-slug-status');
  const altWrap = document.getElementById('venue-slug-alternatives');
  clearTimeout(venueSlugTimeout);
  if (!slug) { statusEl.textContent = ''; altWrap.style.display = 'none'; return; }
  statusEl.textContent = 'Checking...'; statusEl.style.color = 'var(--muted)';
  venueSlugTimeout = setTimeout(async () => {
    const { data } = await db.from('users').select('id').eq('slug', slug).neq('id', currentUser.id).limit(1);
    if (data && data.length > 0) {
      venueSlugAvailable = false;
      statusEl.textContent = '✗ That URL is taken.'; statusEl.style.color = 'var(--error)';
      // Generate alternatives
      const opts = [slug + '-venue', slug + '-' + new Date().getFullYear(), slug + '-events', slug + '-official'];
      const optEls = await Promise.all(opts.map(async o => {
        const { data: ex } = await db.from('users').select('id').eq('slug', o).limit(1);
        const taken = ex && ex.length > 0;
        return `<button type="button" style="font-family:'Space Mono',monospace;font-size:.6rem;padding:.3rem .65rem;border-radius:4px;border:1px solid ${taken?'var(--border)':'var(--neon)'};color:${taken?'var(--muted)':'var(--neon)'};background:transparent;cursor:${taken?'not-allowed':'pointer'};${taken?'text-decoration:line-through;opacity:.4;':''}" ${taken?'disabled':''} onclick="selectVenueSlug('${o}')">${o}</button>`;
      }));
      document.getElementById('venue-slug-options').innerHTML = optEls.join('');
      altWrap.style.display = 'block';
    } else {
      venueSlugAvailable = true;
      statusEl.textContent = '✓ Available!'; statusEl.style.color = 'var(--success)';
      altWrap.style.display = 'none';
      document.getElementById('setting-venue-slug').value = slug;
    }
  }, 500);
}
function selectVenueSlug(slug) {
  document.getElementById('setting-venue-slug').value = slug;
  document.getElementById('venue-slug-alternatives').style.display = 'none';
  document.getElementById('venue-slug-status').textContent = '✓ Available!';
  document.getElementById('venue-slug-status').style.color = 'var(--success)';
  venueSlugAvailable = true;
}
async function saveVenueSlug() {
  const btn = document.getElementById('save-venue-slug-btn');
  const slug = makeVenueSlug(document.getElementById('setting-venue-slug').value);
  if (!slug) { showAlert('alert-venue-slug', 'error', 'Please enter a URL.'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const { data: ex } = await db.from('users').select('id').eq('slug', slug).neq('id', currentUser.id).limit(1);
    if (ex && ex.length > 0) throw new Error('That URL is already taken.');
    const { error } = await db.from('users').update({ slug }).eq('id', currentUser.id);
    if (error) throw error;
    updateStoredUser({ slug });
    showAlert('alert-venue-slug', 'success', '✓ Profile URL updated.');
  } catch(e) { showAlert('alert-venue-slug', 'error', e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save Profile URL'; }
}

// ── VENUE ADDRESS ──────────────────────────────────────────
const COUNTRY_CODES_ADDR = {'United States':'us','United Kingdom':'gb','Canada':'ca','Australia':'au','Germany':'de','France':'fr','Netherlands':'nl','Spain':'es','Italy':'it','Brazil':'br','Mexico':'mx','Japan':'jp','South Africa':'za','New Zealand':'nz','Ireland':'ie','Sweden':'se','Norway':'no','Denmark':'dk','Belgium':'be','Switzerland':'ch','Portugal':'pt'};
let addrTimeout = null;
function debounceAddressLookup() {
  clearTimeout(addrTimeout);
  addrTimeout = setTimeout(lookupAddress, 600);
}
async function lookupAddress() {
  const query = document.getElementById('setting-address').value.trim();
  const suggestEl = document.getElementById('address-suggestions');
  if (query.length < 5) { suggestEl.innerHTML = ''; return; }
  const cc = COUNTRY_CODES_ADDR[currentUser.country] || '';
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}${cc?'&countrycodes='+cc:''}&format=json&limit=5&addressdetails=1`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data || !data.length) { suggestEl.innerHTML = ''; return; }
    suggestEl.innerHTML = `<div class="addr-suggestions">${data.map(r => {
      const addr = r.address;
      const city = addr.suburb || addr.city || addr.town || addr.village || '';
      const state = addr.state || '';
      const zip = addr.postcode || '';
      const display = r.display_name;
      return `<div class="addr-suggestion" onclick="selectAddress('${(addr.house_number?addr.house_number+' ':'')+(addr.road||'')}','${city}','${state}','${zip}','${display.replace(/'/g,"\\'")}')">
        ${display.length > 60 ? display.substring(0,60)+'…' : display}
      </div>`;
    }).join('')}</div>`;
  } catch(e) { suggestEl.innerHTML = ''; }
}
function selectAddress(street, city, state, zip, display) {
  document.getElementById('setting-address').value = street || display.split(',')[0];
  document.getElementById('setting-city').value = city;
  document.getElementById('setting-state').value = state;
  document.getElementById('setting-zip').value = zip;
  document.getElementById('address-suggestions').innerHTML = '';
}
async function saveVenueAddress() {
  const btn = document.getElementById('save-venue-address-btn');
  const address = document.getElementById('setting-address').value.trim();
  const city = document.getElementById('setting-city').value.trim();
  const state = document.getElementById('setting-state').value.trim();
  const zip = document.getElementById('setting-zip').value.trim();
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const { error } = await db.from('users').update({ address, city, state, zip }).eq('id', currentUser.id);
    if (error) throw error;
    updateStoredUser({ address, city, state, zip });
    showAlert('alert-venue-address', 'success', '✓ Address updated.');
  } catch(e) { showAlert('alert-venue-address', 'error', e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save Address'; }
}

function navLogout() {
  localStorage.removeItem('currentUser');
  sessionStorage.removeItem('currentUser');
  window.location.href = '/';
}

async function loadBlockedUsers() {
  const { data } = await db.from('users').select('blocked_users').eq('id', currentUser.id).single();
  const blockedIds = data?.blocked_users || [];
  if (!blockedIds.length) return;
  const { data: users } = await db.from('users').select('id,name').in('id', blockedIds);
  if (!users || !users.length) return;
  const section = document.getElementById('blocked-users-section');
  const list = document.getElementById('blocked-users-list');
  section.style.display = 'block';
  list.innerHTML = users.map(u => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem .85rem;background:var(--deep);border:1px solid var(--border);border-radius:8px;margin-bottom:.5rem;">
      <span style="font-size:.88rem;color:var(--white);">${u.name || 'Unknown User'}</span>
      <button onclick="unblockUser('${u.id}')" style="font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--muted);padding:.3rem .65rem;border-radius:5px;cursor:pointer;" onmouseover="this.style.borderColor='var(--neon)';this.style.color='var(--neon)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">Unblock</button>
    </div>`).join('');
}

async function unblockUser(userId) {
  const { data } = await db.from('users').select('blocked_users').eq('id', currentUser.id).single();
  const updated = (data?.blocked_users || []).filter(id => id !== userId);
  await db.from('users').update({ blocked_users: updated }).eq('id', currentUser.id);
  loadBlockedUsers();
  const section = document.getElementById('blocked-users-section');
  if (updated.length === 0) section.style.display = 'none';
}

loadBlockedUsers();
</script>
