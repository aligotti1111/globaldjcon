<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Drafts - Global DJ Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#050507;--deep:#0a0a10;--card:#13131e;--border:#1e1e30;--neon:#00f5c4;--neon-dim:rgba(0,245,196,0.12);--white:#f0f0f8;--muted:#6b6b88;--success:#3ddc84;--error:#ff5f5f;--amber:#ffb347;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}
header{position:relative;z-index:10;border-bottom:1px solid var(--border);background:rgba(5,5,7,.85);backdrop-filter:blur(12px);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:1rem 4rem;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;background:linear-gradient(135deg,var(--white) 30%,var(--neon) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-btns{display:flex;gap:.6rem;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:.45rem;font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;padding:.6rem 1rem;border-radius:6px;border:1px solid;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;background:transparent;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-outline{border-color:var(--border);color:var(--white);}
.btn-outline:hover{border-color:var(--neon);color:var(--neon);}
.btn-primary{background:var(--neon);border-color:var(--neon);color:var(--black);font-weight:700;}
.btn-primary:hover{opacity:.85;}
.inbox-nav-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:transparent;transition:all .2s;text-decoration:none;}
.inbox-nav-btn:hover{border-color:var(--neon);color:var(--neon);}
.inbox-badge{position:absolute;top:-6px;right:-6px;background:var(--neon);color:var(--black);font-family:'Space Mono',monospace;font-size:.55rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.page{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.08em;margin-bottom:.25rem;}
.page-sub{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;}
.draft-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;border-left:3px solid var(--amber);}
.draft-dj{font-size:1rem;font-weight:600;color:var(--white);margin-bottom:.25rem;}
.draft-date{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:.75rem;}
.draft-details{display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;margin-bottom:1rem;}
.draft-detail{font-size:.8rem;color:var(--muted);}
.draft-detail span{color:var(--white);}
.draft-actions{display:flex;gap:.5rem;}
.btn-sm{padding:.4rem .75rem;font-size:.6rem;}
.btn-danger{border-color:var(--error);color:var(--error);}
.btn-danger:hover{background:rgba(255,95,95,.1);}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.08em;line-height:2;}
@media(max-width:600px){.header-inner{padding:1rem 1.2rem;}.page{padding:1.5rem 1rem 4rem;}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/" class="nav-logo">Global DJ <span style="color:var(--neon)">Connect</span></a>
    <div class="nav-btns">
      <a href="/inbox.html" class="inbox-nav-btn" id="nav-inbox-btn" style="display:none;" title="Inbox">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span class="inbox-badge" id="nav-unread-count" style="display:none;"></span>
      </a>
      <a href="/drafts.html" class="inbox-nav-btn" id="nav-drafts-btn" style="display:none;border-color:var(--neon);color:var(--neon);" title="Booking Drafts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span class="inbox-badge" id="nav-drafts-badge" style="display:none;"></span>
      </a>
      <a href="/account-settings.html" class="inbox-nav-btn" id="nav-settings-btn" style="display:none;" title="Account Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </a>
      <button id="nav-logout" class="btn btn-outline" style="display:none;" onclick="navLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </button>
    </div>
  </div>
</header>

<div class="page">
  <div class="page-title">Booking Drafts</div>
  <div class="page-sub">Your saved booking requests</div>
  <div id="drafts-list"></div>
</div>

<script>
const SUPABASE_URL = 'https://hwqvzuusquruhwguqole.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cXZ6dXVzcXVydWh3Z3Vxb2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjkxNjUsImV4cCI6MjA4NzE0NTE2NX0.TKoNk-u5bEKgVy-pXRrCYv8Iui8SzIa5ExiVUyEJ6UE';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser') || 'null');

const equipLabels = {sound_system:'Full Sound System & Decks',decks_only:'Decks/Controller Only',venue_provides:'Venue Provides All Equipment'};

(function(){
  if (!currentUser) { window.location.href = '/login.html'; return; }
  document.getElementById('nav-logout').style.display = 'inline-flex';
  document.getElementById('nav-inbox-btn').style.display = 'inline-flex';
  document.getElementById('nav-drafts-btn').style.display = 'inline-flex';
  document.getElementById('nav-settings-btn').style.display = 'inline-flex';
  loadInboxBadge();
  loadDrafts();
})();

function navLogout(){ sessionStorage.removeItem('currentUser'); localStorage.removeItem('currentUser'); window.location.href='/login.html'; }

async function loadInboxBadge(){
  try{
    const {data:t} = await db.from('messages').select('id').eq('to_user_id',currentUser.id).eq('read',false).is('parent_id',null);
    const {data:r} = await db.from('messages').select('id').eq('to_user_id',currentUser.id).eq('read',false).not('parent_id','is',null);
    const count = ((t||[]).length)+((r||[]).length);
    const badge = document.getElementById('nav-unread-count');
    if(badge && count>0){badge.textContent=count>99?'99+':count;badge.style.display='flex';}
  }catch(e){}
}

async function loadDrafts() {
  const list = document.getElementById('drafts-list');
  try {
    const { data, error } = await db.from('booking_drafts').select('*').eq('requester_id', currentUser.id).order('updated_at', { ascending: false });
    if (error) throw error;

    if (!data || !data.length) {
      list.innerHTML = '<div class="empty-state">No saved drafts.<br>When you save a booking as a draft it will appear here.</div>';
      return;
    }

    // Get DJ names
    const djIds = [...new Set(data.map(d => d.dj_id).filter(Boolean))];
    let djMap = {};
    if (djIds.length) {
      const { data: djs } = await db.from('users').select('id,name,slug').in('id', djIds);
      (djs||[]).forEach(dj => djMap[dj.id] = dj);
    }

    list.innerHTML = data.map(draft => {
      const d = draft.data || {};
      const dj = djMap[draft.dj_id] || {};
      const dateStr = d.event_date ? new Date(d.event_date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'}) : '—';
      const saved = new Date(draft.updated_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});

      return `<div class="draft-card">
        <div class="draft-dj">${dj.name || 'Unknown DJ'}</div>
        <div class="draft-date">Last saved ${saved}</div>
        <div class="draft-details">
          ${d.event_date ? `<div class="draft-detail">Date: <span>${dateStr}</span></div>` : ''}
          ${d.venue_name ? `<div class="draft-detail">Venue: <span>${d.venue_name}</span></div>` : ''}
          ${d.venue_type ? `<div class="draft-detail">Type: <span>${d.venue_type === 'club' ? 'Club' : 'Bar'}</span></div>` : ''}
          ${d.equipment ? `<div class="draft-detail">Equipment: <span>${equipLabels[d.equipment] || d.equipment}</span></div>` : ''}
        </div>
        <div class="draft-actions">
          <a href="/book.html?dj=${dj.slug || draft.dj_slug}&draft=${draft.id}" class="btn btn-primary btn-sm">Continue Booking</a>
          <button class="btn btn-danger btn-sm" onclick="deleteDraft('${draft.id}', this)">Delete</button>
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    list.innerHTML = `<div class="empty-state">Error loading drafts: ${e.message}</div>`;
  }
}

async function deleteDraft(id, btn) {
  if (!confirm('Delete this draft?')) return;
  btn.disabled = true; btn.textContent = 'Deleting...';
  try {
    await db.from('booking_drafts').delete().eq('id', id).eq('requester_id', currentUser.id);
    loadDrafts();
  } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Delete'; }
}
</script>
</body>
</html>
